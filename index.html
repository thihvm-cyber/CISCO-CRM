<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đài Quan Sát — Nhu cầu khách hàng CRM &amp; Cisco</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" crossorigin></script>
<style>
  :root{
    --bg-deep:#0B1320;
    --bg-panel:#101A2C;
    --bg-card:#141F35;
    --bg-card-hover:#182542;
    --line:#22304A;
    --line-soft:#1A2740;
    --text-hi:#EAF1FB;
    --text-mid:#AEC0DC;
    --text-low:#6E84A8;
    --teal:#2DD4BF;
    --teal-dim:#0F4A45;
    --indigo:#818CF8;
    --indigo-dim:#2C2D6B;
    --amber:#F5A524;
    --amber-dim:#4A3613;
    --rose:#FB7185;
    --rose-dim:#4A1F2A;
    --green:#34D399;
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg-deep);color:var(--text-hi);font-family:var(--font-body);-webkit-font-smoothing:antialiased;}
  #root{min-height:100vh;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
  button{font-family:inherit;cursor:pointer;}
  input,textarea,select{font-family:inherit;}
  *:focus-visible{outline:2px solid var(--teal);outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){*{animation-duration:0.01ms !important;transition-duration:0.01ms !important;}}

  .app-shell{display:flex;min-height:100vh;}
  .sidebar{
    width:248px;flex-shrink:0;background:var(--bg-panel);
    border-right:1px solid var(--line-soft);
    display:flex;flex-direction:column;padding:24px 16px;position:sticky;top:0;height:100vh;
  }
  .brand{display:flex;align-items:center;gap:10px;padding:0 8px 24px;border-bottom:1px solid var(--line-soft);margin-bottom:20px;}
  .brand-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--teal),var(--indigo));display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .brand-name{font-family:var(--font-display);font-weight:600;font-size:15px;line-height:1.2;color:var(--text-hi);}
  .brand-sub{font-size:11px;color:var(--text-low);font-family:var(--font-mono);letter-spacing:0.03em;}

  .nav-item{
    display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;
    color:var(--text-mid);font-size:13.5px;font-weight:500;background:transparent;border:none;width:100%;text-align:left;
    transition:background .15s,color .15s;margin-bottom:2px;
  }
  .nav-item:hover{background:var(--bg-card);color:var(--text-hi);}
  .nav-item.active{background:var(--bg-card);color:var(--teal);}
  .nav-item.active .nav-dot{background:var(--teal);box-shadow:0 0 8px var(--teal);}
  .nav-dot{width:6px;height:6px;border-radius:50%;background:var(--line);flex-shrink:0;transition:background .15s;}
  .nav-section-label{font-size:10.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-low);font-family:var(--font-mono);padding:16px 12px 6px;}

  .sidebar-foot{margin-top:auto;padding:12px;border-top:1px solid var(--line-soft);font-size:11px;color:var(--text-low);font-family:var(--font-mono);}

  .main{flex:1;min-width:0;overflow-x:hidden;}
  .topbar{
    height:64px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;justify-content:space-between;
    padding:0 28px;position:sticky;top:0;background:rgba(11,19,32,0.85);backdrop-filter:blur(8px);z-index:20;
  }
  .topbar h1{font-family:var(--font-display);font-size:17px;font-weight:600;margin:0;}
  .topbar p{font-size:12px;color:var(--text-low);margin:2px 0 0;}
  .content{padding:28px;max-width:1320px;}

  .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:99px;font-size:12px;font-weight:500;}
  .pill-teal{background:var(--teal-dim);color:var(--teal);}
  .pill-indigo{background:var(--indigo-dim);color:var(--indigo);}
  .pill-amber{background:var(--amber-dim);color:var(--amber);}
  .pill-rose{background:var(--rose-dim);color:var(--rose);}
  .pill-neutral{background:var(--bg-card);color:var(--text-mid);border:1px solid var(--line);}

  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
  .kpi-card{background:var(--bg-card);border:1px solid var(--line-soft);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;}
  .kpi-label{font-size:12px;color:var(--text-low);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:10px;}
  .kpi-value{font-family:var(--font-display);font-size:30px;font-weight:600;color:var(--text-hi);line-height:1;}
  .kpi-delta{font-size:12px;margin-top:8px;font-weight:500;}
  .kpi-delta.up{color:var(--green);}
  .kpi-delta.down{color:var(--rose);}

  .card{background:var(--bg-card);border:1px solid var(--line-soft);border-radius:16px;padding:22px;margin-bottom:20px;}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap;}
  .card-title{font-family:var(--font-display);font-size:15.5px;font-weight:600;color:var(--text-hi);}
  .card-sub{font-size:12.5px;color:var(--text-low);margin-top:3px;}
  .grid-2{display:grid;grid-template-columns:1.3fr 1fr;gap:20px;}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}

  .seg-toggle{display:flex;background:var(--bg-panel);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px;}
  .seg-btn{padding:6px 13px;border-radius:7px;border:none;background:transparent;color:var(--text-low);font-size:12.5px;font-weight:500;}
  .seg-btn.active{background:var(--bg-card-hover);color:var(--teal);}

  .btn{padding:9px 16px;border-radius:9px;border:none;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:transform .1s, filter .15s;}
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:linear-gradient(135deg,var(--teal),#22b8a3);color:#04201c;}
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-ghost{background:var(--bg-panel);color:var(--text-mid);border:1px solid var(--line);}
  .btn-ghost:hover{color:var(--text-hi);border-color:var(--text-low);}
  .btn-danger{background:var(--rose-dim);color:var(--rose);}
  .btn-rec{background:var(--rose-dim);color:var(--rose);border:1px solid var(--rose);}
  .btn-rec.recording{background:var(--rose);color:#1a0508;}

  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;color:var(--text-mid);margin-bottom:6px;font-weight:500;}
  .field input,.field select,.field textarea{
    width:100%;background:var(--bg-panel);border:1px solid var(--line);border-radius:9px;color:var(--text-hi);
    padding:10px 12px;font-size:13.5px;transition:border-color .15s;
  }
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal);}
  .field-ai-filled{border-color:var(--teal) !important;background:var(--teal-dim) !important;animation:ai-pulse 1.4s ease-in-out 1;}
  @keyframes ai-pulse{0%{box-shadow:0 0 0 0 rgba(45,212,191,0.5);}70%{box-shadow:0 0 0 6px rgba(45,212,191,0);}100%{box-shadow:0 0 0 0 rgba(45,212,191,0);}}
  .field textarea{resize:vertical;min-height:90px;line-height:1.5;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

  .waveform{display:flex;align-items:center;gap:3px;height:22px;}
  .waveform span{width:3px;background:var(--rose);border-radius:2px;animation:wv 1s ease-in-out infinite;}
  @keyframes wv{0%,100%{height:5px;}50%{height:20px;}}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--text-low);font-weight:500;font-size:11.5px;text-transform:uppercase;letter-spacing:0.03em;padding:9px 12px;border-bottom:1px solid var(--line-soft);font-family:var(--font-mono);}
  td{padding:12px 12px;border-bottom:1px solid var(--line-soft);color:var(--text-mid);vertical-align:top;}
  tr.row-hover:hover td{background:var(--bg-card-hover);}
  td.strong{color:var(--text-hi);font-weight:500;}

  .empty-state{text-align:center;padding:60px 20px;color:var(--text-low);}
  .empty-state .em-icon{font-size:32px;margin-bottom:12px;opacity:0.6;}
  .empty-state h3{color:var(--text-mid);font-family:var(--font-display);font-weight:600;margin:0 0 6px;}
  .empty-state p{font-size:13px;margin:0;}

  .tag-chip{display:inline-flex;padding:4px 10px;border-radius:7px;font-size:11.5px;font-weight:500;background:var(--bg-panel);color:var(--text-mid);border:1px solid var(--line);margin:2px 4px 2px 0;}

  .loader-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--teal);animation:pulse 1.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:0.3;}50%{opacity:1;}}

  .insight-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--line-soft);}
  .insight-item:last-child{border-bottom:none;}
  .insight-num{font-family:var(--font-mono);font-size:11px;color:var(--text-low);width:22px;flex-shrink:0;padding-top:2px;}
  .insight-body p{margin:0 0 6px;font-size:13.5px;line-height:1.55;color:var(--text-mid);}
  .insight-body p strong{color:var(--text-hi);}

  .modal-overlay{position:fixed;inset:0;background:rgba(5,9,16,0.7);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .modal{background:var(--bg-panel);border:1px solid var(--line);border-radius:18px;padding:26px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;}

  .progress-track{height:6px;background:var(--bg-panel);border-radius:99px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:99px;}

  .upload-zone{border:1.5px dashed var(--line);border-radius:12px;padding:28px;text-align:center;background:var(--bg-panel);transition:border-color .15s,background .15s;}
  .upload-zone.drag{border-color:var(--teal);background:var(--teal-dim);}

  @media (max-width:980px){
    .sidebar{display:none;}
    .kpi-grid{grid-template-columns:repeat(2,1fr);}
    .grid-2,.grid-3{grid-template-columns:1fr;}
    .field-row{grid-template-columns:1fr;}
    .content{padding:18px;}
  }
</style>
<script>
  window.addEventListener('error', function(e){
    var root = document.getElementById('root');
    if (root && !root.dataset.mounted) {
      var msg = (e && e.message) ? e.message : 'Lỗi không xác định';
      var src = (e && e.filename) ? e.filename : '';
      root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0B1320;color:#EAF1FB;font-family:sans-serif;padding:24px;text-align:center;">' +
        '<div><div style="font-size:15px;font-weight:600;margin-bottom:8px;">Không tải được một thư viện cần thiết</div>' +
        '<div style="font-size:13px;color:#AEC0DC;max-width:480px;">' + msg + (src ? ('<br><span style="font-size:11px;color:#6E84A8;">' + src + '</span>') : '') + '</div>' +
        '<div style="font-size:12px;color:#6E84A8;margin-top:14px;">Thử tải lại trang. Nếu vẫn lỗi, kiểm tra kết nối mạng hoặc trình chặn quảng cáo (ad-blocker) có đang chặn CDN không.</div></div></div>';
    }
  }, true);
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* ---------------- Lightweight SVG chart components (no external deps) ---------------- */
const CHART_FONT = "11.5px Inter, sans-serif";

function useContainerWidth() {
  const ref = useRef(null);
  const [width, setWidth] = useState(600);
  useEffect(() => {
    if (!ref.current) return;
    const ro = new ResizeObserver(entries => {
      for (const entry of entries) setWidth(Math.max(280, entry.contentRect.width));
    });
    ro.observe(ref.current);
    setWidth(ref.current.offsetWidth || 600);
    return () => ro.disconnect();
  }, []);
  return [ref, width];
}

function ChartTooltip({ x, y, items, visible }) {
  if (!visible) return null;
  return (
    <div style={{
      position: "absolute", left: x, top: y, transform: "translate(-50%,-100%)",
      background: "#101A2C", border: "1px solid #22304A", borderRadius: 9, padding: "8px 11px",
      fontSize: 12.5, color: "#EAF1FB", pointerEvents: "none", zIndex: 10, whiteSpace: "nowrap", boxShadow: "0 6px 18px rgba(0,0,0,0.35)"
    }}>
      {items.map((it, i) => (
        <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, color: it.color || "#AEC0DC" }}>
          {it.color && <span style={{ width: 7, height: 7, borderRadius: "50%", background: it.color, display: "inline-block" }}></span>}
          <span>{it.label}: <strong style={{ color: "#fff" }}>{it.value}</strong></span>
        </div>
      ))}
    </div>
  );
}

function niceMax(max) {
  if (max <= 0) return 5;
  const exp = Math.floor(Math.log10(max));
  const base = Math.pow(10, exp);
  const norm = max / base;
  let n;
  if (norm <= 1) n = 1; else if (norm <= 2) n = 2; else if (norm <= 5) n = 5; else n = 10;
  return n * base;
}

/* AreaChartSVG: data=[{x: label, y: number}], color */
function AreaChartSVG({ data, color = "#2DD4BF", height = 280, valueSuffix = "", yFormatter }) {
  const [wrapRef, width] = useContainerWidth();
  const [hover, setHover] = useState(null);
  const padL = 38, padR = 16, padT = 16, padB = 30;
  const innerW = Math.max(10, width - padL - padR);
  const innerH = height - padT - padB;
  const maxY = niceMax(Math.max(...data.map(d => d.y), 1));
  const n = data.length;
  const stepX = n > 1 ? innerW / (n - 1) : 0;
  const pts = data.map((d, i) => ({ px: padL + stepX * i, py: padT + innerH - (d.y / maxY) * innerH, label: d.x, y: d.y }));
  const linePath = pts.map((p, i) => (i === 0 ? "M" : "L") + p.px.toFixed(1) + "," + p.py.toFixed(1)).join(" ");
  const areaPath = linePath + ` L${(pts[n - 1] ? pts[n - 1].px : padL).toFixed(1)},${(padT + innerH).toFixed(1)} L${padL},${(padT + innerH).toFixed(1)} Z`;
  const gridLines = [0, 0.25, 0.5, 0.75, 1];
  const gid = useRef("g" + Math.random().toString(36).slice(2, 8)).current;
  return (
    <div ref={wrapRef} style={{ position: "relative", width: "100%" }}>
      <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: "block", overflow: "visible" }}>
        <defs>
          <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.45" />
            <stop offset="100%" stopColor={color} stopOpacity="0" />
          </linearGradient>
        </defs>
        {gridLines.map((g, i) => (
          <line key={i} x1={padL} x2={width - padR} y1={padT + innerH * g} y2={padT + innerH * g} stroke="#22304A" strokeDasharray="3 3" />
        ))}
        <text x={8} y={padT + 4} fill="#6E84A8" fontSize="11">{yFormatter ? yFormatter(maxY) : maxY}</text>
        <text x={8} y={padT + innerH + 4} fill="#6E84A8" fontSize="11">0</text>
        <path d={areaPath} fill={`url(#${gid})`} stroke="none" />
        <path d={linePath} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
        {pts.map((p, i) => (
          <g key={i}>
            <circle cx={p.px} cy={p.py} r={hover === i ? 5 : 3} fill={color} stroke="#0B1320" strokeWidth="1.5"
              onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} style={{ cursor: "pointer" }} />
            <rect x={p.px - stepX / 2} y={padT} width={stepX || 20} height={innerH} fill="transparent"
              onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} />
          </g>
        ))}
        {pts.map((p, i) => (i % Math.ceil(n / 8 || 1) === 0 || i === n - 1) && (
          <text key={i} x={p.px} y={height - 8} fill="#6E84A8" fontSize="10.5" textAnchor="middle">{p.label}</text>
        ))}
      </svg>
      {hover !== null && pts[hover] && (
        <ChartTooltip visible={true} x={pts[hover].px} y={pts[hover].py - 8}
          items={[{ label: data[hover].x, value: (data[hover].y) + valueSuffix, color }]} />
      )}
    </div>
  );
}

/* Generic vertical/horizontal bar chart. data=[{name, value}], colorFor(name,i) */
function BarChartSVG({ data, height = 260, colorFor, layout = "vertical", angledLabels = false }) {
  const [wrapRef, width] = useContainerWidth();
  const [hover, setHover] = useState(null);
  if (layout === "horizontal") {
    const padL = 130, padR = 20, padT = 10, padB = 10;
    const innerW = Math.max(10, width - padL - padR);
    const rowH = 30;
    const innerH = data.length * rowH;
    const maxV = niceMax(Math.max(...data.map(d => d.value), 1));
    return (
      <div ref={wrapRef} style={{ position: "relative", width: "100%" }}>
        <svg width="100%" height={innerH + padT + padB} viewBox={`0 0 ${width} ${innerH + padT + padB}`}>
          {data.map((d, i) => {
            const y = padT + i * rowH;
            const w = (d.value / maxV) * innerW;
            const c = colorFor ? colorFor(d.name, i) : "#2DD4BF";
            return (
              <g key={i} onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} style={{ cursor: "pointer" }}>
                <text x={padL - 10} y={y + rowH / 2 + 4} fill="#AEC0DC" fontSize="11.5" textAnchor="end">{d.name}</text>
                <rect x={padL} y={y + 5} width={innerW} height={rowH - 10} fill="#141F35" rx="5" />
                <rect x={padL} y={y + 5} width={Math.max(2, w)} height={rowH - 10} fill={c} rx="5" opacity={hover === i ? 1 : 0.92} />
                <text x={padL + Math.max(2, w) + 8} y={y + rowH / 2 + 4} fill="#EAF1FB" fontSize="11.5">{d.value}</text>
              </g>
            );
          })}
        </svg>
      </div>
    );
  }
  const padL = 38, padR = 14, padT = 16, padB = angledLabels ? 56 : 30;
  const innerW = Math.max(10, width - padL - padR);
  const innerH = height - padT - padB;
  const maxV = niceMax(Math.max(...data.map(d => d.value), 1));
  const n = data.length;
  const slot = innerW / n;
  const barW = Math.min(46, slot * 0.55);
  return (
    <div ref={wrapRef} style={{ position: "relative", width: "100%" }}>
      <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`}>
        {[0, 0.25, 0.5, 0.75, 1].map((g, i) => <line key={i} x1={padL} x2={width - padR} y1={padT + innerH * g} y2={padT + innerH * g} stroke="#22304A" strokeDasharray="3 3" />)}
        <text x={8} y={padT + 4} fill="#6E84A8" fontSize="11">{maxV}</text>
        <text x={8} y={padT + innerH + 4} fill="#6E84A8" fontSize="11">0</text>
        {data.map((d, i) => {
          const cx = padL + slot * i + slot / 2;
          const h = (d.value / maxV) * innerH;
          const c = colorFor ? colorFor(d.name, i) : "#2DD4BF";
          return (
            <g key={i} onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} style={{ cursor: "pointer" }}>
              <rect x={cx - barW / 2} y={padT + innerH - h} width={barW} height={Math.max(1, h)} fill={c} rx="5" opacity={hover === i ? 1 : 0.92} />
              {angledLabels ? (
                <text x={cx} y={padT + innerH + 14} fill="#6E84A8" fontSize="10" textAnchor="end" transform={`rotate(-32 ${cx} ${padT + innerH + 14})`}>{d.name}</text>
              ) : (
                <text x={cx} y={padT + innerH + 18} fill="#6E84A8" fontSize="10.5" textAnchor="middle">{d.name.length > 10 ? d.name.slice(0, 9) + "…" : d.name}</text>
              )}
            </g>
          );
        })}
      </svg>
      {hover !== null && (
        <ChartTooltip visible={true} x={padL + slot * hover + slot / 2} y={padT + innerH - (data[hover].value / maxV) * innerH - 8}
          items={[{ label: data[hover].name, value: data[hover].value, color: colorFor ? colorFor(data[hover].name, hover) : "#2DD4BF" }]} />

/* Stacked bar chart: data=[{month, [seriesKey]: value, ...}], series=[{key,color}] */
function StackedBarChartSVG({ data, series, height = 260 }) {
  const [wrapRef, width] = useContainerWidth();
  const [hover, setHover] = useState(null);
  const padL = 38, padR = 14, padT = 16, padB = 30;
  const innerW = Math.max(10, width - padL - padR);
  const innerH = height - padT - padB;
  const totals = data.map(d => series.reduce((s, sr) => s + (d[sr.key] || 0), 0));
  const maxV = niceMax(Math.max(...totals, 1));
  const n = data.length;
  const slot = innerW / n;
  const barW = Math.min(46, slot * 0.55);
  return (
    <div ref={wrapRef} style={{ position: "relative", width: "100%" }}>
      <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`}>
        {[0, 0.25, 0.5, 0.75, 1].map((g, i) => <line key={i} x1={padL} x2={width - padR} y1={padT + innerH * g} y2={padT + innerH * g} stroke="#22304A" strokeDasharray="3 3" />)}
        <text x={8} y={padT + 4} fill="#6E84A8" fontSize="11">{maxV}</text>
        <text x={8} y={padT + innerH + 4} fill="#6E84A8" fontSize="11">0</text>
        {data.map((d, i) => {
          const cx = padL + slot * i + slot / 2;
          let yCursor = padT + innerH;
          return (
            <g key={i} onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} style={{ cursor: "pointer" }}>
              {series.map((sr, si) => {
                const v = d[sr.key] || 0;
                const h = (v / maxV) * innerH;
                yCursor -= h;
                return <rect key={si} x={cx - barW / 2} y={yCursor} width={barW} height={Math.max(0, h)} fill={sr.color} rx={si === series.length - 1 ? 4 : 0} opacity={hover === i ? 1 : 0.92} />;
              })}
              <text x={cx} y={padT + innerH + 18} fill="#6E84A8" fontSize="10.5" textAnchor="middle">{d.month}</text>
            </g>

      {hover !== null && (
        <ChartTooltip visible={true} x={padL + slot * hover + slot / 2} y={padT + innerH - (totals[hover] / maxV) * innerH - 8}
          items={series.map(sr => ({ label: sr.key, value: data[hover][sr.key] || 0, color: sr.color }))} />

          <div key={i} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11.5, color: "#AEC0DC" }}>
            <span style={{ width: 8, height: 8, borderRadius: 2, background: sr.color, display: "inline-block" }}></span>{sr.key}

/* Donut/Pie chart: data=[{name, value}], colors=[] */
function PieChartSVG({ data, colors, height = 280 }) {
  const [hover, setHover] = useState(null);
  const total = data.reduce((s, d) => s + d.value, 0) || 1;
  const size = Math.min(height, 280);
  const cx = size / 2, cy = size / 2, rOuter = size * 0.38, rInner = size * 0.23;
  let angle = -90;
  const slices = data.map((d, i) => {
    const frac = d.value / total;
    const startAngle = angle;
    const endAngle = angle + frac * 360;
    angle = endAngle;
    return { ...d, startAngle, endAngle, color: colors[i % colors.length] };
  });
  const polarToCart = (r, a) => { const rad = (a * Math.PI) / 180; return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)]; };
  const arcPath = (s) => {
    const [x1, y1] = polarToCart(rOuter, s.startAngle);
    const [x2, y2] = polarToCart(rOuter, s.endAngle);
    const [x3, y3] = polarToCart(rInner, s.endAngle);
    const [x4, y4] = polarToCart(rInner, s.startAngle);
    const largeArc = s.endAngle - s.startAngle > 180 ? 1 : 0;
    return `M${x1},${y1} A${rOuter},${rOuter} 0 ${largeArc} 1 ${x2},${y2} L${x3},${y3} A${rInner},${rInner} 0 ${largeArc} 0 ${x4},${y4} Z`;
  };
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 24, flexWrap: "wrap", justifyContent: "center" }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {slices.map((s, i) => (
          <path key={i} d={arcPath(s)} fill={s.color} opacity={hover === null || hover === i ? 1 : 0.45}
            onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} style={{ cursor: "pointer", transition: "opacity .15s" }} />
        ))}
        <text x={cx} y={cy - 4} textAnchor="middle" fill="#EAF1FB" fontSize="20" fontWeight="600" fontFamily="Space Grotesk, sans-serif">
          {hover !== null ? slices[hover].value : total}
        </text>
        <text x={cx} y={cy + 14} textAnchor="middle" fill="#6E84A8" fontSize="10.5">
          {hover !== null ? slices[hover].name.slice(0, 14) : "Tổng"}
        </text>
      </svg>
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {slices.map((s, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12.5, color: hover === i ? "#EAF1FB" : "#AEC0DC", cursor: "pointer" }}
            onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)}>
            <span style={{ width: 10, height: 10, borderRadius: 3, background: s.color, display: "inline-block" }}></span>
            {s.name} <span style={{ color: "#6E84A8" }}>({s.value})</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* Radar chart: data=[{name, value}] */
function RadarChartSVG({ data, height = 300, color = "#2DD4BF" }) {
  const size = Math.min(height, 300);
  const cx = size / 2, cy = size / 2, r = size * 0.34;
  const maxV = niceMax(Math.max(...data.map(d => d.value), 1));
  const n = data.length || 1;
  const angleStep = (Math.PI * 2) / n;
  const pointFor = (i, value) => {
    const a = -Math.PI / 2 + angleStep * i;
    const rad = (value / maxV) * r;
    return [cx + rad * Math.cos(a), cy + rad * Math.sin(a)];
  };
  const ringLevels = [0.25, 0.5, 0.75, 1];
  const polygonFor = (frac) => data.map((d, i) => pointFor(i, maxV * frac).join(",")).join(" ");
  const dataPolygon = data.map((d, i) => pointFor(i, d.value).join(",")).join(" ");
  return (
    <div style={{ display: "flex", justifyContent: "center" }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {ringLevels.map((f, i) => <polygon key={i} points={polygonFor(f)} fill="none" stroke="#22304A" strokeWidth="1" />)}
        {data.map((d, i) => { const [x, y] = pointFor(i, maxV); return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#22304A" strokeWidth="1" />; })}
        <polygon points={dataPolygon} fill={color} fillOpacity="0.32" stroke={color} strokeWidth="2" />
        {data.map((d, i) => { const [x, y] = pointFor(i, d.value); return <circle key={i} cx={x} cy={y} r="3" fill={color} />; })}
        {data.map((d, i) => {
          const [lx, ly] = pointFor(i, maxV * 1.18);
          return <text key={i} x={lx} y={ly} fill="#AEC0DC" fontSize="11" textAnchor="middle" dominantBaseline="middle">{d.name.length > 10 ? d.name.slice(0, 9) + "…" : d.name}</text>;
        })}
      </svg>
    </div>
  );
}

/* ---------------- Firebase helpers (Realtime Database, đồng bộ đa thiết bị) ---------------- */
function waitForFirebase(timeoutMs = 8000) {
  return new Promise((resolve) => {
    if (window.__firebase && window.__firebase.ready) { resolve(true); return; }
    const onReady = () => { window.removeEventListener("firebase-ready", onReady); resolve(!!(window.__firebase && window.__firebase.ready)); };
    window.addEventListener("firebase-ready", onReady);
    setTimeout(() => { window.removeEventListener("firebase-ready", onReady); resolve(!!(window.__firebase && window.__firebase.ready)); }, timeoutMs);
  });
}
async function saveCustomers(list) {
  const ok = await waitForFirebase();
  if (!ok || !window.__firebase) { console.error("Firebase chưa sẵn sàng, không lưu được"); return; }
  try { await window.__firebase.saveCustomers(list); } catch (e) { console.error("Lỗi lưu Firebase:", e); }
}

/* ---------------- Gemini API call helper (giữ tên callClaude để tương thích các chỗ gọi cũ) ---------------- */
const GEMINI_API_KEY = "AQ.Ab8RN6I9sW3QaJWxEwhycV18GdC_imryH9c6XvyDb85e9PDMyQ";
const GEMINI_MODEL = "gemini-1.5-pro";
async function callClaude(systemPrompt, userPrompt, maxTokens = 1500) {
  let resp;
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`;
  try {
    resp = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: systemPrompt + "\n\n" + userPrompt }] }],
        generationConfig: { maxOutputTokens: maxTokens, temperature: 0.3 }
      })
    });
  } catch (networkErr) {
    throw new Error("Không kết nối được tới AI (lỗi mạng): " + networkErr.message);
  }
  if (!resp.ok) {
    let detail = "";
    try { const errBody = await resp.json(); detail = errBody?.error?.message || JSON.stringify(errBody); } catch (e2) { try { detail = await resp.text(); } catch (e3) { detail = ""; } }
    throw new Error(`API lỗi ${resp.status}${detail ? ": " + detail : ""}`);
  }
  const data = await resp.json();
  const candidate = data?.candidates?.[0];
  const text = (candidate?.content?.parts || []).map(p => p.text || "").join("\n");
  if (!text) {
    const blockReason = data?.promptFeedback?.blockReason;
    throw new Error(blockReason ? `AI từ chối xử lý (${blockReason})` : "AI trả về phản hồi trống");
  }
  return text;
}
function parseJSONLoose(text) {
  let clean = text.trim().replace(/^```json/i, "").replace(/^```/, "").replace(/```$/, "").trim();
  try { return JSON.parse(clean); } catch (e) {
    const match = clean.match(/\{[\s\S]*\}|\[[\s\S]*\]/);
    if (match) { try { return JSON.parse(match[0]); } catch (e2) { return null; } }
    return null;
  }
}

      else notify("AI đã làm sạch ghi chú, nhưng không nhận diện được thông tin công ty/ngành/giai đoạn cụ thể — bạn điền tay giúp các trường còn thiếu", "info");
    } catch (e) {
      console.error("Lỗi xử lý AI cho ghi âm (lần " + attempt + "):", e);
      if (attempt < 2) {
        setAiProcessing(false);
        await new Promise(r => setTimeout(r, 600));
        return processTranscriptWithAI(rawText, attempt + 1);
      }
      setRecError("AI xử lý ghi âm thất bại (" + (e.message || "lỗi không xác định") + "). Ghi chú gốc vẫn được giữ — bạn có thể sửa tay hoặc bấm ghi âm lại.");
    } finally {
      setAiProcessing(false);
    }
  };

  const transcriptRef = useRef("");
  const silenceTimerRef = useRef(null);
  const startRecording = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setRecError("Trình duyệt không hỗ trợ ghi âm giọng nói. Hãy dùng Chrome trên máy tính hoặc Android."); return; }
    setRecError("");
    const rec = new SR();
    rec.lang = "vi-VN";
    rec.continuous = true;
    rec.interimResults = true;
    let finalTranscript = "";
    const resetSilenceTimer = () => {
      clearTimeout(silenceTimerRef.current);
      silenceTimerRef.current = setTimeout(() => {
        if (recognitionRef.current) recognitionRef.current.stop();
      }, 3000);
    };
    rec.onresult = (e) => {
      let interim = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + " ";
        else interim += e.results[i][0].transcript;
      }
      transcriptRef.current = (finalTranscript + interim).trim();
      setForm(f => ({ ...f, note: transcriptRef.current }));
      resetSilenceTimer();
    };
    rec.onerror = (e) => {
      clearTimeout(silenceTimerRef.current);
      if (e.error !== "no-speech" && e.error !== "aborted") setRecError("Lỗi ghi âm: " + e.error);
      setRecording(false);
    };
    rec.onend = () => {
      clearTimeout(silenceTimerRef.current);
      setRecording(false);
      processTranscriptWithAI(transcriptRef.current);
    };
    recognitionRef.current = rec;
    transcriptRef.current = "";
    rec.start();
    setRecording(true);
    resetSilenceTimer();
  };
  const stopRecording = () => {
    clearTimeout(silenceTimerRef.current);
    recognitionRef.current && recognitionRef.current.stop();
    setRecording(false);
  };


  const handleSubmit = (e) => {
    e.preventDefault();
    if (recording) { notify("Đang ghi âm — hãy bấm dừng ghi và chờ AI xử lý xong trước khi lưu", "error"); return; }
    if (aiProcessing) { notify("AI đang xử lý ghi chú, vui lòng chờ vài giây rồi thử lại", "error"); return; }
    if (!form.company.trim() || !form.note.trim()) { notify("Cần ít nhất Tên công ty và Ghi chú nhu cầu", "error"); return; }
    const rec = {
      id: editingId || uid(),
      company: form.company.trim(), industry: form.industry, product: form.product,
      stage: form.stage, value: form.value ? Number(form.value) : null,
      note: form.note.trim(), date: new Date(form.date).toISOString(), source: "manual"
    };
    if (editingId) {
      setCustomers(prev => prev.map(c => c.id === editingId ? rec : c));
      notify("Đã cập nhật khách hàng", "success");
    } else {
      setCustomers(prev => [rec, ...prev]);
      notify("Đã thêm khách hàng mới", "success");
    }
    resetForm();
  };

  const handleEdit = (c) => { setForm({ company: c.company, industry: c.industry, product: c.product, stage: c.stage, value: c.value || "", note: c.note, date: c.date.slice(0, 10) }); setEditingId(c.id); window.scrollTo({ top: 0, behavior: "smooth" }); };
  const handleDelete = (id) => { setCustomers(prev => prev.filter(c => c.id !== id)); notify("Đã xoá", "success"); };

  const parseRows = (rows) => {
    // Try to map flexible Vietnamese/English headers
    const norm = (s) => (s || "").toString().toLowerCase().trim();
    const findKey = (obj, keys) => Object.keys(obj).find(k => keys.some(kk => norm(k).includes(kk)));
    const out = [];
    for (const row of rows) {
      const companyKey = findKey(row, ["công ty", "cong ty", "khách hàng", "khach hang", "company", "tên"]);
      const industryKey = findKey(row, ["ngành", "nganh", "industry"]);
      const productKey = findKey(row, ["sản phẩm", "san pham", "product"]);
      const stageKey = findKey(row, ["giai đoạn", "giai doan", "stage", "trạng thái", "trang thai"]);
      const valueKey = findKey(row, ["giá trị", "gia tri", "value", "deal"]);
      const noteKey = findKey(row, ["ghi chú", "ghi chu", "note", "mô tả", "mo ta", "nhu cầu", "nhu cau"]);
      const dateKey = findKey(row, ["ngày", "ngay", "date"]);
      if (!companyKey && !noteKey) continue;
      let rawVal = valueKey ? row[valueKey] : null;
      let numVal = null;
      if (rawVal != null) { numVal = Number(String(rawVal).replace(/[^\d.-]/g, "")); if (isNaN(numVal)) numVal = null; }
      let rawDate = dateKey ? row[dateKey] : null;
      let isoDate = new Date().toISOString();
      if (rawDate) { const d = new Date(rawDate); if (!isNaN(d.getTime())) isoDate = d.toISOString(); }
      out.push({
        id: uid(),
        company: companyKey ? String(row[companyKey] || "Không rõ tên") : "Không rõ tên",
        industry: industryKey ? String(row[industryKey] || "Khác") : "Khác",
        product: productKey ? String(row[productKey] || PRODUCTS[0]) : PRODUCTS[0],
        stage: stageKey ? String(row[stageKey] || STAGES[0]) : STAGES[0],
        value: numVal, note: noteKey ? String(row[noteKey] || "") : "",
        date: isoDate, source: "import"
      });
    }
    return out;
  };

  const handleFile = (file) => {
    if (!file) return;
    setImporting(true);
    const ext = file.name.split(".").pop().toLowerCase();
    if (ext === "csv") {
      Papa.parse(file, {
        header: true, skipEmptyLines: true,
        complete: (res) => { const rows = parseRows(res.data); setCustomers(prev => [...rows, ...prev]); notify(`Đã nhập ${rows.length} khách hàng từ CSV`, "success"); setImporting(false); },
        error: () => { notify("Không đọc được file CSV", "error"); setImporting(false); }
      });
    } else if (ext === "xlsx" || ext === "xls") {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const wb = XLSX.read(e.target.result, { type: "array" });
          const sheet = wb.Sheets[wb.SheetNames[0]];
          const json = XLSX.utils.sheet_to_json(sheet, { defval: "" });
          const rows = parseRows(json);
          setCustomers(prev => [...rows, ...prev]);
          notify(`Đã nhập ${rows.length} khách hàng từ Excel`, "success");
        } catch (err) { notify("Không đọc được file Excel", "error"); }
        setImporting(false);
      };
      reader.readAsArrayBuffer(file);
    } else { notify("Chỉ hỗ trợ file .csv, .xlsx, .xls", "error"); setImporting(false); }
  };

  return (
    <div>
      <div className="grid-2">
        <div className="card">
          <div className="card-head">
            <div>
              <div className="card-title">{editingId ? "Cập nhật khách hàng" : "Thêm khách hàng / nhu cầu mới"}</div>
              <div className="card-sub">Nhập tay hoặc nói trực tiếp ghi chú nhu cầu bằng tiếng Việt</div>
            </div>
            {editingId && <button className="btn btn-ghost" onClick={resetForm}>Hủy chỉnh sửa</button>}
          </div>
          <form onSubmit={handleSubmit}>
            <div className="field-row">
              <div className="field">
                <label>Tên khách hàng / công ty *</label>
                <input className={highlightFields.company ? "field-ai-filled" : ""} value={form.company} onChange={e => setForm(f => ({ ...f, company: e.target.value }))} placeholder="VD: Công ty TNHH Mekong Retail" />
              </div>
              <div className="field">
                <label>Ngành</label>
                <select className={highlightFields.industry ? "field-ai-filled" : ""} value={form.industry} onChange={e => setForm(f => ({ ...f, industry: e.target.value }))}>
                  {INDUSTRIES.map(i => <option key={i} value={i}>{i}</option>)}
                </select>
              </div>
            </div>
            <div className="field-row">
              <div className="field">
                <label>Sản phẩm quan tâm</label>
                <select className={highlightFields.product ? "field-ai-filled" : ""} value={form.product} onChange={e => setForm(f => ({ ...f, product: e.target.value }))}>
                  {PRODUCTS.map(p => <option key={p} value={p}>{p}</option>)}
                </select>
              </div>
              <div className="field">
                <label>Giai đoạn sale</label>
                <select className={highlightFields.stage ? "field-ai-filled" : ""} value={form.stage} onChange={e => setForm(f => ({ ...f, stage: e.target.value }))}>
                  {STAGES.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>
            </div>
            <div className="field-row">
              <div className="field">
                <label>Giá trị deal (VND)</label>
                <input className={highlightFields.value ? "field-ai-filled" : ""} type="number" value={form.value} onChange={e => setForm(f => ({ ...f, value: e.target.value }))} placeholder="VD: 150000000" />
              </div>
              <div className="field">
                <label>Ngày ghi nhận</label>
                <input type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} />
              </div>
            </div>
            <div className="field">
              <label style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span>Ghi chú nhu cầu *</span>
                <button type="button" className={"btn btn-rec" + (recording ? " recording" : "")} style={{ padding: "4px 10px", fontSize: 11.5, opacity: aiProcessing ? 0.6 : 1 }} onClick={recording ? stopRecording : startRecording} disabled={aiProcessing}>
                  {recording ? (
                    <span className="waveform"><span style={{ animationDelay: "0s" }}></span><span style={{ animationDelay: ".15s" }}></span><span style={{ animationDelay: ".3s" }}></span><span style={{ animationDelay: ".1s" }}></span></span>
                  ) : aiProcessing ? <span className="loader-dot"></span> : "●"} {recording ? "Đang ghi…" : aiProcessing ? "AI đang xử lý…" : "Ghi âm tiếng Việt"}
                </button>
              </label>
              <textarea value={form.note} onChange={e => setForm(f => ({ ...f, note: e.target.value }))} placeholder="VD: Khách phàn nàn tổng đài nghẽn giờ cao điểm, cần nâng cấp gấp..." disabled={aiProcessing} style={aiProcessing ? { opacity: 0.6 } : {}} />
              {recording && <div style={{ color: "var(--text-low)", fontSize: 12, marginTop: 6 }}>Đang nghe… tự dừng sau 3 giây im lặng, hoặc bấm nút để dừng ngay</div>}
              {aiProcessing && <div style={{ color: "var(--teal)", fontSize: 12, marginTop: 6 }}>✦ AI đang làm sạch ghi chú và trích xuất thông tin (công ty, ngành, giai đoạn, giá trị)…</div>}
              {recError && <div style={{ color: "var(--rose)", fontSize: 12, marginTop: 6 }}>{recError}</div>}
            </div>
            <button type="submit" className="btn btn-primary" style={{ width: "100%", justifyContent: "center", opacity: (recording || aiProcessing) ? 0.5 : 1, cursor: (recording || aiProcessing) ? "not-allowed" : "pointer" }} disabled={recording || aiProcessing}>
              {recording ? "Đang ghi âm — bấm dừng trước" : aiProcessing ? "Đang chờ AI xử lý…" : editingId ? "Lưu thay đổi" : "Thêm vào hệ thống"}
            </button>
          </form>
        </div>

        <div>
          <div className="card">
            <div className="card-head">
              <div>
                <div className="card-title">Nhập từ file Excel / CSV</div>
                <div className="card-sub">Hỗ trợ cột: tên công ty, ngành, sản phẩm, giai đoạn, giá trị, ghi chú, ngày</div>
              </div>
            </div>
            <div
              className={"upload-zone" + (dragActive ? " drag" : "")}
              onDragOver={e => { e.preventDefault(); setDragActive(true); }}
              onDragLeave={() => setDragActive(false)}
              onDrop={e => { e.preventDefault(); setDragActive(false); handleFile(e.dataTransfer.files[0]); }}
              onClick={() => fileInputRef.current.click()}
              style={{ cursor: "pointer" }}
            >
              <input ref={fileInputRef} type="file" accept=".csv,.xlsx,.xls" style={{ display: "none" }} onChange={e => handleFile(e.target.files[0])} />
              <div style={{ fontSize: 26, marginBottom: 8, color: "var(--text-low)" }}>⇧</div>
              <div style={{ fontSize: 13.5, color: "var(--text-mid)", marginBottom: 4 }}>{importing ? "Đang xử lý file…" : "Kéo thả file vào đây, hoặc bấm để chọn"}</div>
              <div style={{ fontSize: 11.5, color: "var(--text-low)" }}>.csv .xlsx .xls</div>
            </div>
          </div>
          <div className="card" style={{ marginBottom: 0 }}>
            <div className="card-title" style={{ marginBottom: 10 }}>Mẹo nhập liệu nhanh</div>
            <ul style={{ margin: 0, paddingLeft: 18, color: "var(--text-mid)", fontSize: 12.8, lineHeight: 1.7 }}>
              <li>Ghi âm trực tiếp ngay sau cuộc gọi để không quên chi tiết nhu cầu.</li>
              <li>Mô tả nhu cầu cụ thể (đau ở đâu, vì sao) giúp AI gợi ý chính xác hơn ở tab "Gợi ý AI".</li>
              <li>File Excel có thể để nguyên tiêu đề tiếng Việt, hệ thống tự nhận diện cột.</li>
            </ul>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-head">
          <div className="card-title">Danh sách khách hàng ({customers.length})</div>
        </div>
        {customers.length === 0 ? (
          <div className="empty-state">
            <div className="em-icon">◎</div>
            <h3>Chưa có dữ liệu</h3>
            <p>Thêm khách hàng đầu tiên bằng form bên trên hoặc nhập file Excel/CSV.</p>
          </div>
        ) : (
          <div style={{ overflowX: "auto" }}>
            <table>
              <thead><tr><th>Công ty</th><th>Ngành</th><th>Sản phẩm</th><th>Giai đoạn</th><th>Giá trị</th><th>Ghi chú</th><th>Ngày</th><th></th></tr></thead>
              <tbody>
                {customers.slice(0, 50).map(c => (
                  <tr key={c.id} className="row-hover">
                    <td className="strong">{c.company}</td>
                    <td>{c.industry}</td>
                    <td>{c.product}</td>
                    <td><span className="pill" style={{ background: STAGE_COLORS[c.stage] + "22", color: STAGE_COLORS[c.stage] }}>{c.stage}</span></td>
                    <td>{fmtVND(c.value)}</td>
                    <td style={{ maxWidth: 280 }}>{c.note.length > 90 ? c.note.slice(0, 90) + "…" : c.note}</td>
                    <td style={{ whiteSpace: "nowrap" }}>{fmtDate(c.date)}</td>
                    <td style={{ whiteSpace: "nowrap" }}>
                      <button className="btn btn-ghost" style={{ padding: "5px 9px", fontSize: 11.5, marginRight: 6 }} onClick={() => handleEdit(c)}>Sửa</button>
                      <button className="btn btn-danger" style={{ padding: "5px 9px", fontSize: 11.5 }} onClick={() => handleDelete(c.id)}>Xoá</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            {customers.length > 50 && <div style={{ textAlign: "center", color: "var(--text-low)", fontSize: 12, marginTop: 12 }}>Hiển thị 50/{customers.length} khách hàng gần nhất</div>}
          </div>
        )}
      </div>
    </div>
  );
}

/* ================= DASHBOARD PAGE ================= */
function DashboardPage({ customers, range, setRange }) {
  const filtered = useMemo(() => filterByRange(customers, range), [customers, range]);

  const kpis = useMemo(() => {
    const total = filtered.length;
    const won = filtered.filter(c => c.stage === "Ký hợp đồng");
    const lost = filtered.filter(c => c.stage === "Mất khách");
    const wonValue = won.reduce((s, c) => s + (c.value || 0), 0);
    const pipelineValue = filtered.filter(c => c.stage !== "Mất khách").reduce((s, c) => s + (c.value || 0), 0);
    const winRate = total ? Math.round((won.length / total) * 100) : 0;
    return { total, wonCount: won.length, lostCount: lost.length, wonValue, pipelineValue, winRate };
  }, [filtered]);

  const stageData = useMemo(() => {
    return STAGES.map(s => ({ name: s, value: filtered.filter(c => c.stage === s).length }));
  }, [filtered]);

  const productData = useMemo(() => {
    return PRODUCTS.map(p => ({ name: p, value: filtered.filter(c => c.product === p).length }));
  }, [filtered]);

  const monthlyTrend = useMemo(() => buildMonthlyTrend(filtered), [filtered]);

  const industryData = useMemo(() => {
    const map = {};
    filtered.forEach(c => { map[c.industry] = (map[c.industry] || 0) + 1; });
    return Object.entries(map).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value).slice(0, 8);
  }, [filtered]);

  const PIE_COLORS = ["#2DD4BF", "#818CF8", "#F5A524"];

  return (
    <div>
      <RangeBar range={range} setRange={setRange} />
      <div className="kpi-grid">
        <KpiCard label="Tổng khách hàng theo dõi" value={kpis.total} sub={`${filtered.length} bản ghi trong kỳ`} />
        <KpiCard label="Tỷ lệ chốt hợp đồng" value={kpis.winRate + "%"} sub={`${kpis.wonCount} ký / ${kpis.lostCount} mất`} accent={kpis.winRate >= 30 ? "up" : "down"} />
        <KpiCard label="Giá trị đã ký" value={fmtVND(kpis.wonValue) + " ₫"} sub="Tổng deal đã chốt" />
        <KpiCard label="Giá trị pipeline" value={fmtVND(kpis.pipelineValue) + " ₫"} sub="Đang theo đuổi (chưa mất)" />
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card-head">
            <div><div className="card-title">Xu hướng nhu cầu theo thời gian</div><div className="card-sub">Số lượng khách hàng tiếp cận mỗi giai đoạn theo tháng</div></div>
          </div>
          {monthlyTrend.length === 0 ? <EmptyChart /> : (
            <AreaChartSVG data={monthlyTrend.map(d => ({ x: d.month, y: d.count }))} color="#2DD4BF" height={280} />
          )}
        </div>

        <div className="card">
          <div className="card-head"><div className="card-title">Phân bổ theo sản phẩm</div></div>
          {filtered.length === 0 ? <EmptyChart /> : (
            <PieChartSVG data={productData} colors={PIE_COLORS} height={280} />
          )}
        </div>
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card-head"><div className="card-title">Khách hàng theo giai đoạn (funnel)</div></div>
          {filtered.length === 0 ? <EmptyChart /> : (
            <BarChartSVG data={stageData} layout="horizontal" colorFor={(name) => STAGE_COLORS[name]} height={260} />
          )}
        </div>
        <div className="card">
          <div className="card-head"><div className="card-title">Top ngành quan tâm</div></div>
          {industryData.length === 0 ? <EmptyChart /> : (
            <BarChartSVG data={industryData} colorFor={() => "#818CF8"} angledLabels height={260} />
          )}
        </div>
      </div>
    </div>
  );
}

function EmptyChart() {
  return <div className="empty-state" style={{ padding: "40px 20px" }}><p>Chưa có dữ liệu trong kỳ này</p></div>;
}

function KpiCard({ label, value, sub, accent }) {
  return (
    <div className="kpi-card">
      <div className="kpi-label">{label}</div>
      <div className="kpi-value">{value}</div>
      {sub && <div className={"kpi-delta" + (accent ? " " + accent : "")}>{sub}</div>}
    </div>
  );
}

function RangeBar({ range, setRange }) {
  return (
    <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 16 }}>
      <div className="seg-toggle">
        {[{ k: "3m", l: "3 tháng" }, { k: "6m", l: "6 tháng" }, { k: "12m", l: "12 tháng" }, { k: "all", l: "Tất cả" }].map(o => (
          <button key={o.k} className={"seg-btn" + (range === o.k ? " active" : "")} onClick={() => setRange(o.k)}>{o.l}</button>
        ))}
      </div>
    </div>
  );
}

function filterByRange(customers, range) {
  if (range === "all") return customers;
  const months = range === "3m" ? 3 : range === "6m" ? 6 : 12;
  const cutoff = new Date(); cutoff.setMonth(cutoff.getMonth() - months);
  return customers.filter(c => new Date(c.date) >= cutoff);
}

function buildMonthlyTrend(customers) {
  const map = {};
  customers.forEach(c => { const k = monthKey(c.date); map[k] = (map[k] || 0) + 1; });
  return Object.entries(map).sort((a, b) => a[0].localeCompare(b[0])).map(([k, v]) => {
    const [y, m] = k.split("-");
    return { month: `${m}/${y.slice(2)}`, count: v };
  });
}

/* ================= TRENDS PAGE ================= */
function TrendsPage({ customers, range, setRange }) {
  const filtered = useMemo(() => filterByRange(customers, range), [customers, range]);

  const stageOverTime = useMemo(() => {
    const map = {};
    filtered.forEach(c => {
      const k = monthKey(c.date);
      if (!map[k]) map[k] = { month: k };
      map[k][c.stage] = (map[k][c.stage] || 0) + 1;
    });
    return Object.entries(map).sort((a, b) => a[0].localeCompare(b[0])).map(([k, v]) => {
      const [y, m] = k.split("-");
      return { ...v, month: `${m}/${y.slice(2)}` };
    });
  }, [filtered]);

  const productOverTime = useMemo(() => {
    const map = {};
    filtered.forEach(c => {
      const k = monthKey(c.date);
      if (!map[k]) map[k] = { month: k };
      map[k][c.product] = (map[k][c.product] || 0) + 1;
    });
    return Object.entries(map).sort((a, b) => a[0].localeCompare(b[0])).map(([k, v]) => {
      const [y, m] = k.split("-");
      return { ...v, month: `${m}/${y.slice(2)}` };
    });
  }, [filtered]);

  const valueByMonth = useMemo(() => {
    const map = {};
    filtered.forEach(c => {
      const k = monthKey(c.date);
      map[k] = (map[k] || 0) + (c.value || 0);
    });
    return Object.entries(map).sort((a, b) => a[0].localeCompare(b[0])).map(([k, v]) => {
      const [y, m] = k.split("-");
      return { month: `${m}/${y.slice(2)}`, value: Math.round(v / 1e6) };
    });
  }, [filtered]);

  const industryRadar = useMemo(() => {
    const map = {};
    filtered.forEach(c => { map[c.industry] = (map[c.industry] || 0) + 1; });
    return Object.entries(map).map(([name, value]) => ({ name, value })).slice(0, 7);
  }, [filtered]);

  return (
    <div>
      <RangeBar range={range} setRange={setRange} />
      <div className="card">
        <div className="card-head"><div><div className="card-title">Xu hướng giai đoạn sale theo tháng</div><div className="card-sub">Theo dõi khách hàng di chuyển qua từng giai đoạn funnel</div></div></div>
        {stageOverTime.length === 0 ? <EmptyChart /> : (
          <MultiLineChartSVG data={stageOverTime} series={STAGES.map(s => ({ key: s, color: STAGE_COLORS[s] }))} height={300} />
        )}
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card-head"><div className="card-title">Nhu cầu CRM vs Cisco theo thời gian</div></div>
          {productOverTime.length === 0 ? <EmptyChart /> : (
            <StackedBarChartSVG data={productOverTime} series={PRODUCTS.map((p, i) => ({ key: p, color: ["#2DD4BF", "#818CF8", "#F5A524"][i] }))} height={260} />
          )}
        </div>
        <div className="card">
          <div className="card-head"><div className="card-title">Giá trị deal theo tháng (triệu ₫)</div></div>
          {valueByMonth.length === 0 ? <EmptyChart /> : (
            <AreaChartSVG data={valueByMonth.map(d => ({ x: d.month, y: d.value }))} color="#F5A524" height={260} valueSuffix=" tr ₫" />
          )}
        </div>
      </div>

      <div className="card" style={{ marginBottom: 0 }}>
        <div className="card-head"><div className="card-title">Bản đồ quan tâm theo ngành</div></div>
        {industryRadar.length === 0 ? <EmptyChart /> : (
          <RadarChartSVG data={industryRadar} height={300} color="#2DD4BF" />
        )}
      </div>
    </div>
  );
}

/* ================= DEEP DIVE PAGE ================= */
function DeepDivePage({ customers }) {
  const [selectedStage, setSelectedStage] = useState("all");
  const [selectedProduct, setSelectedProduct] = useState("all");
  const [search, setSearch] = useState("");

  const filtered = useMemo(() => {
    return customers.filter(c => {
      if (selectedStage !== "all" && c.stage !== selectedStage) return false;
      if (selectedProduct !== "all" && c.product !== selectedProduct) return false;
      if (search && !(c.company + c.note + c.industry).toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    });
  }, [customers, selectedStage, selectedProduct, search]);

  const lostAnalysis = useMemo(() => {
    const lost = customers.filter(c => c.stage === "Mất khách");
    const byIndustry = {};
    lost.forEach(c => { byIndustry[c.industry] = (byIndustry[c.industry] || 0) + 1; });
    return { count: lost.length, byIndustry: Object.entries(byIndustry).sort((a, b) => b[1] - a[1]) };
  }, [customers]);

  const avgDealByProduct = useMemo(() => {
    return PRODUCTS.map(p => {
      const items = customers.filter(c => c.product === p && c.value);
      const avg = items.length ? items.reduce((s, c) => s + c.value, 0) / items.length : 0;
      return { name: p, value: Math.round(avg / 1e6) };
    });
  }, [customers]);

  const stuckDeals = useMemo(() => {
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
    return customers.filter(c => c.stage !== "Ký hợp đồng" && c.stage !== "Mất khách" && new Date(c.date) < cutoff)
      .sort((a, b) => new Date(a.date) - new Date(b.date));
  }, [customers]);

  return (
    <div>
      <div className="grid-3" style={{ marginBottom: 20 }}>
        <div className="kpi-card">
          <div className="kpi-label">Khách hàng đã mất</div>
          <div className="kpi-value" style={{ color: "var(--rose)" }}>{lostAnalysis.count}</div>
          <div className="kpi-delta down">{lostAnalysis.byIndustry[0] ? `Nhiều nhất: ${lostAnalysis.byIndustry[0][0]}` : "—"}</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label">Deal trị giá TB — CRM</div>
          <div className="kpi-value">{fmtVND((avgDealByProduct[0] && avgDealByProduct[0].value * 1e6) || 0)}</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label">Deal bị "đứng" &gt; 30 ngày</div>
          <div className="kpi-value" style={{ color: "var(--amber)" }}>{stuckDeals.length}</div>
          <div className="kpi-delta">Cần follow-up gấp</div>
        </div>
      </div>

      {stuckDeals.length > 0 && (
        <div className="card">
          <div className="card-head"><div><div className="card-title">⚠ Deal đang bị đứng (chưa cập nhật &gt; 30 ngày)</div><div className="card-sub">Ưu tiên liên hệ lại để tránh mất khách</div></div></div>
          <div style={{ overflowX: "auto" }}>
            <table>
              <thead><tr><th>Công ty</th><th>Giai đoạn</th><th>Giá trị</th><th>Lần cập nhật cuối</th><th>Ghi chú</th></tr></thead>
              <tbody>
                {stuckDeals.slice(0, 8).map(c => (
                  <tr key={c.id} className="row-hover">
                    <td className="strong">{c.company}</td>
                    <td><span className="pill" style={{ background: STAGE_COLORS[c.stage] + "22", color: STAGE_COLORS[c.stage] }}>{c.stage}</span></td>
                    <td>{fmtVND(c.value)}</td>
                    <td>{fmtDate(c.date)}</td>
                    <td style={{ maxWidth: 260 }}>{c.note.slice(0, 70)}…</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      <div className="card">
        <div className="card-head">
          <div className="card-title">Bộ lọc tra cứu chi tiết</div>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            <select value={selectedStage} onChange={e => setSelectedStage(e.target.value)} style={{ background: "var(--bg-panel)", border: "1px solid var(--line)", color: "var(--text-hi)", borderRadius: 8, padding: "7px 10px", fontSize: 12.5 }}>
              <option value="all">Tất cả giai đoạn</option>{STAGES.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
            <select value={selectedProduct} onChange={e => setSelectedProduct(e.target.value)} style={{ background: "var(--bg-panel)", border: "1px solid var(--line)", color: "var(--text-hi)", borderRadius: 8, padding: "7px 10px", fontSize: 12.5 }}>
              <option value="all">Tất cả sản phẩm</option>{PRODUCTS.map(p => <option key={p} value={p}>{p}</option>)}
            </select>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Tìm theo tên, ngành, từ khoá..." style={{ background: "var(--bg-panel)", border: "1px solid var(--line)", color: "var(--text-hi)", borderRadius: 8, padding: "7px 10px", fontSize: 12.5, minWidth: 200 }} />
          </div>
        </div>
        <div style={{ color: "var(--text-low)", fontSize: 12, marginBottom: 10 }}>{filtered.length} kết quả</div>
        <div style={{ overflowX: "auto", maxHeight: 420, overflowY: "auto" }}>
          <table>
            <thead><tr><th>Công ty</th><th>Ngành</th><th>Sản phẩm</th><th>Giai đoạn</th><th>Giá trị</th><th>Ghi chú nhu cầu</th><th>Ngày</th></tr></thead>
            <tbody>
              {filtered.map(c => (
                <tr key={c.id} className="row-hover">
                  <td className="strong">{c.company}</td>
                  <td>{c.industry}</td>
                  <td>{c.product}</td>
                  <td><span className="pill" style={{ background: STAGE_COLORS[c.stage] + "22", color: STAGE_COLORS[c.stage] }}>{c.stage}</span></td>
                  <td>{fmtVND(c.value)}</td>
                  <td style={{ maxWidth: 320 }}>{c.note}</td>
                  <td style={{ whiteSpace: "nowrap" }}>{fmtDate(c.date)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ================= AI INSIGHTS PAGE ================= */
function AIPage({ customers, notify }) {
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");
  const [lastRunAt, setLastRunAt] = useState(null);
  const [mode, setMode] = useState("full"); // full | ideas | painpoints

  useEffect(() => {
    let unsub = null;
    (async () => {
      const ok = await waitForFirebase();
      if (!ok || !window.__firebase) return;
      unsub = window.__firebase.onAICache((cache) => {
        if (cache && cache.result) { setResult(cache.result); setLastRunAt(cache.at); }
      });
    })();
    return () => { if (unsub) unsub(); };
  }, []);

  const runAnalysis = async () => {
    if (customers.length === 0) { notify("Chưa có dữ liệu khách hàng để phân tích", "error"); return; }
    setLoading(true); setError("");
    try {
      const sample = customers.slice(0, 80).map(c => ({
        company: c.company, industry: c.industry, product: c.product, stage: c.stage, value: c.value, note: c.note, date: c.date.slice(0, 10)
      }));
      const system = `Bạn là chuyên gia phân tích sale công nghệ B2B tại Việt Nam, chuyên sâu về CRM và hệ thống tổng đài Cisco. Bạn nhận dữ liệu khách hàng (JSON) gồm ghi chú nhu cầu dạng văn bản tiếng Việt. Nhiệm vụ: phân tích sâu (deep-dive) và đưa ra khuyến nghị, gợi ý ý tưởng sản phẩm/bán hàng cụ thể, thực tế, có thể hành động ngay. Trả lời CHỈ bằng JSON hợp lệ, không thêm văn bản nào khác, không markdown, theo đúng cấu trúc sau:
{
  "summary": "2-3 câu tóm tắt tình hình tổng quan bằng tiếng Việt",
  "pain_points": [{"theme": "tên chủ đề pain point", "frequency": "cao/trung bình/thấp", "detail": "giải thích ngắn", "affected_segment": "phân khúc/ngành bị ảnh hưởng nhiều nhất"}],
  "trends": [{"title": "tên xu hướng", "detail": "giải thích", "direction": "tăng/giảm/ổn định"}],
  "segments": [{"name": "tên phân khúc khách hàng", "characteristic": "đặc điểm nhu cầu chính", "opportunity": "cơ hội bán hàng"}],
  "risk_alerts": [{"issue": "vấn đề/rủi ro", "why": "lý do", "action": "hành động đề xuất"}],
  "product_ideas": [{"idea": "tên ý tưởng sản phẩm/tính năng", "rationale": "vì sao nên làm, dựa trên data nào", "target_segment": "đối tượng phù hợp"}],
  "sales_ideas": [{"idea": "tên ý tưởng chiến thuật bán hàng/chương trình", "rationale": "lý do", "expected_impact": "tác động kỳ vọng"}]
}
Mỗi mảng tối đa 5 phần tử, ưu tiên chất lượng và tính cụ thể hơn số lượng. Luôn dựa trên dữ liệu được cung cấp, không bịa thông tin ngoài data.`;
      const userMsg = `Dữ liệu khách hàng (${sample.length} bản ghi):\n${JSON.stringify(sample)}\n\nHãy phân tích sâu theo đúng cấu trúc JSON yêu cầu.`;
      const text = await callClaude(system, userMsg, 3500);
      const parsed = parseJSONLoose(text);
      if (!parsed) throw new Error("Không phân tích được kết quả AI trả về");
      setResult(parsed);
      const now = new Date().toISOString();
      setLastRunAt(now);
      await saveAICache({ result: parsed, at: now });
      notify("Phân tích AI hoàn tất", "success");
    } catch (e) {
      console.error(e);
      setError(e.message || "Có lỗi xảy ra khi phân tích");
      notify("Phân tích AI thất bại, thử lại sau", "error");
    } finally { setLoading(false); }
  };

  return (
    <div>
      <div className="card">
        <div className="card-head">
          <div>
            <div className="card-title">Phân tích sâu bằng AI</div>
            <div className="card-sub">
              {lastRunAt ? `Lần phân tích gần nhất: ${new Date(lastRunAt).toLocaleString("vi-VN")}` : "Chưa từng phân tích"} · dựa trên {Math.min(customers.length, 80)} bản ghi gần nhất
            </div>
          </div>
          <button className="btn btn-primary" onClick={runAnalysis} disabled={loading}>
            {loading ? <><span className="loader-dot"></span>Đang phân tích…</> : "✦ Phân tích ngay"}
          </button>
        </div>
        {error && <div style={{ color: "var(--rose)", fontSize: 13 }}>{error}</div>}
        {!result && !loading && (
          <div className="empty-state">
            <div className="em-icon">✦</div>
            <h3>Sẵn sàng phân tích</h3>
            <p>Bấm "Phân tích ngay" để AI đọc toàn bộ ghi chú nhu cầu và đưa ra pain points, xu hướng, và gợi ý ý tưởng.</p>
          </div>
        )}
        {loading && (
          <div className="empty-state">
            <div style={{ display: "flex", justifyContent: "center", gap: 6, marginBottom: 14 }}>
              <span className="loader-dot"></span><span className="loader-dot" style={{ animationDelay: ".2s" }}></span><span className="loader-dot" style={{ animationDelay: ".4s" }}></span>
            </div>
            <p>AI đang đọc ghi chú nhu cầu và tổng hợp insight, vài giây nữa...</p>
          </div>
        )}
      </div>

      {result && !loading && (
        <>
          <div className="card">
            <div className="card-title" style={{ marginBottom: 10 }}>Tóm tắt tình hình</div>
            <p style={{ color: "var(--text-mid)", fontSize: 14, lineHeight: 1.6, margin: 0 }}>{result.summary}</p>
          </div>

          <div className="grid-2">
            <SectionList title="Pain points nổi bật" items={result.pain_points} color="var(--rose)" render={(it, i) => (
              <div className="insight-item" key={i}>
                <div className="insight-num">{String(i + 1).padStart(2, "0")}</div>
                <div className="insight-body">
                  <p><strong>{it.theme}</strong> <span className="tag-chip" style={{ borderColor: "var(--rose)", color: "var(--rose)" }}>{it.frequency}</span></p>
                  <p>{it.detail}</p>
                  {it.affected_segment && <p style={{ color: "var(--text-low)", fontSize: 12 }}>Phân khúc ảnh hưởng: {it.affected_segment}</p>}
                </div>
              </div>
            )} />
            <SectionList title="Xu hướng phát hiện" items={result.trends} color="var(--teal)" render={(it, i) => (
              <div className="insight-item" key={i}>
                <div className="insight-num">{String(i + 1).padStart(2, "0")}</div>
                <div className="insight-body">
                  <p><strong>{it.title}</strong> <span className="tag-chip" style={{ borderColor: it.direction === "tăng" ? "var(--green)" : it.direction === "giảm" ? "var(--rose)" : "var(--text-low)", color: it.direction === "tăng" ? "var(--green)" : it.direction === "giảm" ? "var(--rose)" : "var(--text-low)" }}>{it.direction}</span></p>
                  <p>{it.detail}</p>
                </div>
              </div>
            )} />
          </div>

          <div className="grid-2">
            <SectionList title="Phân khúc khách hàng" items={result.segments} color="var(--indigo)" render={(it, i) => (
              <div className="insight-item" key={i}>
                <div className="insight-num">{String(i + 1).padStart(2, "0")}</div>
                <div className="insight-body">
                  <p><strong>{it.name}</strong></p>
                  <p>{it.characteristic}</p>
                  <p style={{ color: "var(--teal)", fontSize: 12.5 }}>Cơ hội: {it.opportunity}</p>
                </div>
              </div>
            )} />
            <SectionList title="Cảnh báo rủi ro" items={result.risk_alerts} color="var(--amber)" render={(it, i) => (
              <div className="insight-item" key={i}>
                <div className="insight-num">{String(i + 1).padStart(2, "0")}</div>
                <div className="insight-body">
                  <p><strong>{it.issue}</strong></p>
                  <p>{it.why}</p>
                  <p style={{ color: "var(--amber)", fontSize: 12.5 }}>→ {it.action}</p>
                </div>
              </div>
            )} />
          </div>

          <div className="grid-2" style={{ marginBottom: 0 }}>
            <SectionList title="💡 Ý tưởng sản phẩm" items={result.product_ideas} color="var(--teal)" render={(it, i) => (
              <div className="insight-item" key={i}>
                <div className="insight-num">{String(i + 1).padStart(2, "0")}</div>
                <div className="insight-body">
                  <p><strong>{it.idea}</strong></p>
                  <p>{it.rationale}</p>
                  {it.target_segment && <p style={{ color: "var(--text-low)", fontSize: 12 }}>Đối tượng: {it.target_segment}</p>}
                </div>
              </div>
            )} />
            <SectionList title="🚀 Ý tưởng bán hàng" items={result.sales_ideas} color="var(--indigo)" render={(it, i) => (
              <div className="insight-item" key={i}>
                <div className="insight-num">{String(i + 1).padStart(2, "0")}</div>
                <div className="insight-body">
                  <p><strong>{it.idea}</strong></p>
                  <p>{it.rationale}</p>
                  {it.expected_impact && <p style={{ color: "var(--green)", fontSize: 12.5 }}>Tác động kỳ vọng: {it.expected_impact}</p>}
                </div>
              </div>
            )} />
          </div>
        </>
      )}
    </div>
  );
}

function SectionList({ title, items, render }) {
  return (
    <div className="card">
      <div className="card-title" style={{ marginBottom: 6 }}>{title}</div>
      {(!items || items.length === 0) ? <p style={{ color: "var(--text-low)", fontSize: 13 }}>Không có dữ liệu nổi bật.</p> : items.map(render)}
    </div>
  );
}

/* ================= APP ROOT ================= */
function App() {
  const [active, setActive] = useState("input");
  const [customers, setCustomers] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [range, setRange] = useState("all");
  const [toast, setToast] = useState(null);
  const [fbConnected, setFbConnected] = useState(false);
  const saveTimer = useRef(null);
  const isRemoteUpdate = useRef(false);

  const notify = useCallback((message, type = "info") => setToast({ message, type, key: Date.now() }), []);

  useEffect(() => {
    setLoaded(true); // hiện UI ngay, không chờ mạng — Firebase kết nối ngầm phía sau
    let unsub = null;
    (async () => {
      const ok = await waitForFirebase(3000);
      if (!ok || !window.__firebase) {
        notify("Không kết nối được Firebase — kiểm tra lại cấu hình hoặc kết nối mạng", "error");
        return;
      }
      setFbConnected(true);
      unsub = window.__firebase.onCustomers((data) => {
        isRemoteUpdate.current = true;
        if (!data) { setCustomers([]); }
        else {
          // Firebase trả object {id: record} hoặc array — chuẩn hoá về array
          const list = Array.isArray(data) ? data.filter(Boolean) : Object.values(data);
          setCustomers(list);
        }
      });
    })();
    return () => { if (unsub) unsub(); };
  }, []);

  useEffect(() => {
    if (!loaded || !fbConnected) return;
    if (isRemoteUpdate.current) { isRemoteUpdate.current = false; return; } // dữ liệu vừa nhận từ Firebase, không ghi lại
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => saveCustomers(customers), 400);
  }, [customers, loaded, fbConnected]);

  const pageTitles = {
    input: ["Nhập liệu", "Thêm khách hàng mới hoặc nhập từ file Excel/CSV"],
    dashboard: ["Dashboard tổng quan", "Theo dõi sức khoẻ pipeline CRM & Cisco theo thời gian thực"],
    trends: ["Phân tích xu hướng", "Diễn biến nhu cầu khách hàng qua các tháng/quý"],
    deepdive: ["Deep-dive vấn đề", "Đào sâu nguyên nhân mất khách, deal bị đứng, và chi tiết từng bản ghi"],
    ai: ["Gợi ý từ AI", "Phân tích ghi chú nhu cầu tiếng Việt để tìm pain points và ý tưởng"]
  };
  const [title, sub] = pageTitles[active];

  return (
    <div className="app-shell">
      <Sidebar active={active} setActive={setActive} count={customers.length} />
      <div className="main">
        <div className="topbar">
          <div><h1>{title}</h1><p>{sub}</p></div>
          <div className={"pill " + (fbConnected ? "pill-teal" : "pill-amber")}>● {fbConnected ? "Đồng bộ Firebase — realtime" : "Chưa kết nối Firebase"}</div>
        </div>
        <div className="content">
          {!loaded ? (
            <div className="empty-state"><span className="loader-dot"></span> Đang tải dữ liệu…</div>
          ) : (
            <>
              {active === "input" && <InputPage customers={customers} setCustomers={setCustomers} notify={notify} />}
              {active === "dashboard" && <DashboardPage customers={customers} range={range} setRange={setRange} />}
              {active === "trends" && <TrendsPage customers={customers} range={range} setRange={setRange} />}
              {active === "deepdive" && <DeepDivePage customers={customers} />}
              {active === "ai" && <AIPage customers={customers} notify={notify} />}
            </>
          )}
        </div>
      </div>
      {toast && <Toast key={toast.key} message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}
