<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đài Quan Sát — Nhu cầu khách hàng CRM &amp; Cisco</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" crossorigin></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
  :root{
    --bg-deep:#0B1320; --bg-panel:#101A2C; --bg-card:#141F35; --bg-card-hover:#182542;
    --line:#22304A; --line-soft:#1A2740; --text-hi:#EAF1FB; --text-mid:#AEC0DC; --text-low:#6E84A8;
    --teal:#2DD4BF; --teal-dim:#0F4A45; --indigo:#818CF8; --indigo-dim:#2C2D6B;
    --amber:#F5A524; --amber-dim:#4A3613; --rose:#FB7185; --rose-dim:#4A1F2A; --green:#34D399;
    --font-display:'Space Grotesk', sans-serif; --font-body:'Inter', sans-serif; --font-mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg-deep);color:var(--text-hi);font-family:var(--font-body);-webkit-font-smoothing:antialiased;}
  #root{min-height:100vh;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
  button{font-family:inherit;cursor:pointer;}
  input,textarea,select{font-family:inherit;}
  *:focus-visible{outline:2px solid var(--teal);outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){*{animation-duration:0.01ms !important;transition-duration:0.01ms !important;}}

  .app-shell{display:flex;min-height:100vh;}
  .sidebar{width:248px;flex-shrink:0;background:var(--bg-panel);border-right:1px solid var(--line-soft);display:flex;flex-direction:column;padding:24px 16px;position:sticky;top:0;height:100vh;}
  .brand{display:flex;align-items:center;gap:10px;padding:0 8px 24px;border-bottom:1px solid var(--line-soft);margin-bottom:20px;}
  .brand-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--teal),var(--indigo));display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .brand-name{font-family:var(--font-display);font-weight:600;font-size:15px;line-height:1.2;color:var(--text-hi);}
  .brand-sub{font-size:11px;color:var(--text-low);font-family:var(--font-mono);letter-spacing:0.03em;}

  .nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;color:var(--text-mid);font-size:13.5px;font-weight:500;background:transparent;border:none;width:100%;text-align:left;transition:background .15s,color .15s;margin-bottom:2px;}
  .nav-item:hover{background:var(--bg-card);color:var(--text-hi);}
  .nav-item.active{background:var(--bg-card);color:var(--teal);}
  .nav-item.active .nav-dot{background:var(--teal);box-shadow:0 0 8px var(--teal);}
  .nav-dot{width:6px;height:6px;border-radius:50%;background:var(--line);flex-shrink:0;transition:background .15s;}
  .nav-section-label{font-size:10.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-low);font-family:var(--font-mono);padding:16px 12px 6px;}
  .sidebar-foot{margin-top:auto;padding:12px;border-top:1px solid var(--line-soft);font-size:11px;color:var(--text-low);font-family:var(--font-mono);}

  .main{flex:1;min-width:0;overflow-x:hidden;}
  .topbar{height:64px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;background:rgba(11,19,32,0.85);backdrop-filter:blur(8px);z-index:20;}
  .topbar h1{font-family:var(--font-display);font-size:17px;font-weight:600;margin:0;}
  .topbar p{font-size:12px;color:var(--text-low);margin:2px 0 0;}
  .content{padding:28px;max-width:1320px;}

  .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:99px;font-size:12px;font-weight:500;}
  .pill-teal{background:var(--teal-dim);color:var(--teal);}
  .pill-indigo{background:var(--indigo-dim);color:var(--indigo);}
  .pill-amber{background:var(--amber-dim);color:var(--amber);}
  .pill-rose{background:var(--rose-dim);color:var(--rose);}
  .pill-neutral{background:var(--bg-card);color:var(--text-mid);border:1px solid var(--line);}

  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
  .kpi-card{background:var(--bg-card);border:1px solid var(--line-soft);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;}
  .kpi-label{font-size:12px;color:var(--text-low);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:10px;}
  .kpi-value{font-family:var(--font-display);font-size:30px;font-weight:600;color:var(--text-hi);line-height:1;}
  .kpi-delta{font-size:12px;margin-top:8px;font-weight:500;}
  .kpi-delta.up{color:var(--green);}
  .kpi-delta.down{color:var(--rose);}

  .card{background:var(--bg-card);border:1px solid var(--line-soft);border-radius:16px;padding:22px;margin-bottom:20px;}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap;}
  .card-title{font-family:var(--font-display);font-size:15.5px;font-weight:600;color:var(--text-hi);}
  .card-sub{font-size:12.5px;color:var(--text-low);margin-top:3px;}
  .grid-2{display:grid;grid-template-columns:1.3fr 1fr;gap:20px;}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}

  .seg-toggle{display:flex;background:var(--bg-panel);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px;}
  .seg-btn{padding:6px 13px;border-radius:7px;border:none;background:transparent;color:var(--text-low);font-size:12.5px;font-weight:500;}
  .seg-btn.active{background:var(--bg-card-hover);color:var(--teal);}

  .btn{padding:9px 16px;border-radius:9px;border:none;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:transform .1s, filter .15s;}
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:linear-gradient(135deg,var(--teal),#22b8a3);color:#04201c;}
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-ghost{background:var(--bg-panel);color:var(--text-mid);border:1px solid var(--line);}
  .btn-ghost:hover{color:var(--text-hi);border-color:var(--text-low);}
  .btn-danger{background:var(--rose-dim);color:var(--rose);}
  .btn-rec{background:var(--rose-dim);color:var(--rose);border:1px solid var(--rose);}
  .btn-rec.recording{background:var(--rose);color:#1a0508;}

  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;color:var(--text-mid);margin-bottom:6px;font-weight:500;}
  .field input,.field select,.field textarea{width:100%;background:var(--bg-panel);border:1px solid var(--line);border-radius:9px;color:var(--text-hi);padding:10px 12px;font-size:13.5px;transition:border-color .15s;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal);}
  .field-ai-filled{border-color:var(--teal) !important;background:var(--teal-dim) !important;animation:ai-pulse 1.4s ease-in-out 1;}
  @keyframes ai-pulse{0%{box-shadow:0 0 0 0 rgba(45,212,191,0.5);}70%{box-shadow:0 0 0 6px rgba(45,212,191,0);}100%{box-shadow:0 0 0 0 rgba(45,212,191,0);}}
  .field textarea{resize:vertical;min-height:90px;line-height:1.5;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

  .waveform{display:flex;align-items:center;gap:3px;height:22px;}
  .waveform span{width:3px;background:var(--rose);border-radius:2px;animation:wv 1s ease-in-out infinite;}
  @keyframes wv{0%,100%{height:5px;}50%{height:20px;}}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--text-low);font-weight:500;font-size:11.5px;text-transform:uppercase;letter-spacing:0.03em;padding:9px 12px;border-bottom:1px solid var(--line-soft);font-family:var(--font-mono);}
  td{padding:12px 12px;border-bottom:1px solid var(--line-soft);color:var(--text-mid);vertical-align:top;}
  tr.row-hover:hover td{background:var(--bg-card-hover);}
  td.strong{color:var(--text-hi);font-weight:500;}

  .empty-state{text-align:center;padding:60px 20px;color:var(--text-low);}
  .empty-state .em-icon{font-size:32px;margin-bottom:12px;opacity:0.6;}
  .empty-state h3{color:var(--text-mid);font-family:var(--font-display);font-weight:600;margin:0 0 6px;}
  .empty-state p{font-size:13px;margin:0;}
  .tag-chip{display:inline-flex;padding:4px 10px;border-radius:7px;font-size:11.5px;font-weight:500;background:var(--bg-panel);color:var(--text-mid);border:1px solid var(--line);margin:2px 4px 2px 0;}
  .loader-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--teal);animation:pulse 1.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:0.3;}50%{opacity:1;}}

  .insight-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--line-soft);}
  .insight-item:last-child{border-bottom:none;}
  .insight-num{font-family:var(--font-mono);font-size:11px;color:var(--text-low);width:22px;flex-shrink:0;padding-top:2px;}
  .insight-body p{margin:0 0 6px;font-size:13.5px;line-height:1.55;color:var(--text-mid);}
  .insight-body p strong{color:var(--text-hi);}
  .upload-zone{border:1.5px dashed var(--line);border-radius:12px;padding:28px;text-align:center;background:var(--bg-panel);transition:border-color .15s,background .15s;}
  .upload-zone.drag{border-color:var(--teal);background:var(--teal-dim);}

  @media (max-width:980px){
    .sidebar{display:none;}
    .kpi-grid{grid-template-columns:repeat(2,1fr);}
    .grid-2,.grid-3{grid-template-columns:1fr;}
    .field-row{grid-template-columns:1fr;}
    .content{padding:18px;}
  }
</style>
<script>
  window.addEventListener('error', function(e){
    var root = document.getElementById('root');
    if (root && !root.dataset.mounted) {
      var msg = (e && e.message) ? e.message : 'Lỗi không xác định';
      var src = (e && e.filename) ? e.filename : '';
      root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0B1320;color:#EAF1FB;font-family:sans-serif;padding:24px;text-align:center;">' +
        '<div><div style="font-size:15px;font-weight:600;margin-bottom:8px;">Lỗi tải trang</div>' +
        '<div style="font-size:13px;color:#AEC0DC;max-width:480px;">' + msg + (src ? ('<br><span style="font-size:11px;color:#6E84A8;">' + src + '</span>') : '') + '</div></div></div>';
    }
  }, true);
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* ---------------- CẤU HÌNH FIREBASE REALTIME DATABASE ---------------- */
const firebaseConfig = {
  apiKey: "AIzaSyCpAeL2TtXUV4YFFd22M3Zeu2Q6ZFRDVCg",
  authDomain: "cisco-crm.firebaseapp.com",
  databaseURL: "https://cisco-crm-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "cisco-crm",
  storageBucket: "cisco-crm.firebasestorage.app",
  messagingSenderId: "983212214414",
  appId: "1:983212214414:web:9f57f8fba8cdf2c8e621df"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const dbRT = firebase.database().ref("customers");

function useContainerWidth() {
  const ref = useRef(null);
  const [width, setWidth] = useState(600);
  useEffect(() => {
    if (!ref.current) return;
    const ro = new ResizeObserver(entries => { for (const entry of entries) setWidth(Math.max(280, entry.contentRect.width)); });
    ro.observe(ref.current);
    setWidth(ref.current.offsetWidth || 600);
    return () => ro.disconnect();
  }, []);
  return [ref, width];
}

function ChartTooltip({ x, y, items, visible }) {
  if (!visible) return null;
  return (
    <div style={{ position: "absolute", left: x, top: y, transform: "translate(-50%,-100%)", background: "#101A2C", border: "1px solid #22304A", borderRadius: 9, padding: "8px 11px", fontSize: 12.5, color: "#EAF1FB", pointerEvents: "none", zIndex: 10, whiteSpace: "nowrap", boxShadow: "0 6px 18px rgba(0,0,0,0.35)" }}>
      {items.map((it, i) => (
        <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, color: it.color || "#AEC0DC" }}>
          {it.color && <span style={{ width: 7, height: 7, borderRadius: "50%", background: it.color, display: "inline-block" }}></span>}
          <span>{it.label}: <strong style={{ color: "#fff" }}>{it.value}</strong></span>
        </div>
      ))}
    </div>
  );
}

function niceMax(max) {
  if (max <= 0) return 5;
  const exp = Math.floor(Math.log10(max));
  const base = Math.pow(10, exp);
  const norm = max / base;
  let n;
  if (norm <= 1) n = 1; else if (norm <= 2) n = 2; else if (norm <= 5) n = 5; else n = 10;
  return n * base;
}

function AreaChartSVG({ data, color = "#2DD4BF", height = 280, valueSuffix = "", yFormatter }) {
  const [wrapRef, width] = useContainerWidth();
  const [hover, setHover] = useState(null);
  const padL = 38, padR = 16, padT = 16, padB = 30;
  const innerW = Math.max(10, width - padL - padR);
  const innerH = height - padT - padB;
  const maxY = niceMax(Math.max(...data.map(d => d.y), 1));
  const n = data.length;
  const stepX = n > 1 ? innerW / (n - 1) : 0;
  const pts = data.map((d, i) => ({ px: padL + stepX * i, py: padT + innerH - (d.y / maxY) * innerH, label: d.x, y: d.y }));
  const linePath = pts.map((p, i) => (i === 0 ? "M" : "L") + p.px.toFixed(1) + "," + p.py.toFixed(1)).join(" ");
  const areaPath = linePath + ` L${(pts[n - 1] ? pts[n - 1].px : padL).toFixed(1)},${(padT + innerH).toFixed(1)} L${padL},${(padT + innerH).toFixed(1)} Z`;
  const gid = useRef("g" + Math.random().toString(36).slice(2, 8)).current;
  return (
    <div ref={wrapRef} style={{ position: "relative", width: "100%" }}>
      <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: "block", overflow: "visible" }}>
        <defs>
          <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.45" /><stop offset="100%" stopColor={color} stopOpacity="0" /></linearGradient>
        </defs>
        {[0, 0.25, 0.5, 0.75, 1].map((g, i) => <line key={i} x1={padL} x2={width - padR} y1={padT + innerH * g} y2={padT + innerH * g} stroke="#22304A" strokeDasharray="3 3" />)}
        <text x={8} y={padT + 4} fill="#6E84A8" fontSize="11">{yFormatter ? yFormatter(maxY) : maxY}</text>
        <text x={8} y={padT + innerH + 4} fill="#6E84A8" fontSize="11">0</text>
        <path d={areaPath} fill={`url(#${gid})`} stroke="none" />
        <path d={linePath} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
        {pts.map((p, i) => (
          <g key={i}>
            <circle cx={p.px} cy={p.py} r={hover === i ? 5 : 3} fill={color} stroke="#0B1320" strokeWidth="1.5" onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} style={{ cursor: "pointer" }} />
            <rect x={p.px - stepX / 2} y={padT} width={stepX || 20} height={innerH} fill="transparent" onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} />
          </g>
        ))}
        {pts.map((p, i) => (i % Math.ceil(n / 8 || 1) === 0 || i === n - 1) && <text key={i} x={p.px} y={height - 8} fill="#6E84A8" fontSize="10.5" textAnchor="middle">{p.label}</text>)}
      </svg>
      {hover !== null && pts[hover] && <ChartTooltip visible={true} x={pts[hover].px} y={pts[hover].py - 8} items={[{ label: data[hover].x, value: (data[hover].y) + valueSuffix, color }]} />}
    </div>
  );
}

function BarChartSVG({ data, height = 260, colorFor, layout = "vertical", angledLabels = false }) {
  const [wrapRef, width] = useContainerWidth();
  const [hover, setHover] = useState(null);
  if (layout === "horizontal") {
    const padL = 130, padR = 20, padT = 10, padB = 10;
    const innerW = Math.max(10, width - padL - padR);
    const rowH = 30;
    const innerH = data.length * rowH;
    const maxV = niceMax(Math.max(...data.map(d => d.value), 1));
    return (
      <div ref={wrapRef} style={{ position: "relative", width: "100%" }}>
        <svg width="100%" height={innerH + padT + padB} viewBox={`0 0 ${width} ${innerH + padT + padB}`}>
          {data.map((d, i) => {
            const y = padT + i * rowH;
            const w = (d.value / maxV) * innerW;
            const c = colorFor ? colorFor(d.name, i) : "#2DD4BF";
            return (
              <g key={i} onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} style={{ cursor: "pointer" }}>
                <text x={padL - 10} y={y + rowH / 2 + 4} fill="#AEC0DC" fontSize="11.5" textAnchor="end">{d.name}</text>
                <rect x={padL} y={y + 5} width={innerW} height={rowH - 10} fill="#141F35" rx="5" />
                <rect x={padL} y={y + 5} width={Math.max(2, w)} height={rowH - 10} fill={c} rx="5" opacity={hover === i ? 1 : 0.92} />
                <text x={padL + Math.max(2, w) + 8} y={y + rowH / 2 + 4} fill="#EAF1FB" fontSize="11.5">{d.value}</text>
              </g>
            );
          })}
        </svg>
      </div>
    );
  }
  const padL = 38, padR = 14, padT = 16, padB = angledLabels ? 56 : 30;
  const innerW = Math.max(10, width - padL - padR);
  const innerH = height - padT - padB;
  const maxV = niceMax(Math.max(...data.map(d => d.value), 1));
  const n = data.length;
  const slot = innerW / n;
  const barW = Math.min(46, slot * 0.55);
  return (
    <div ref={wrapRef} style={{ position: "relative", width: "100%" }}>
      <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`}>
        {[0, 0.25, 0.5, 0.75, 1].map((g, i) => <line key={i} x1={padL} x2={width - padR} y1={padT + innerH * g} y2={padT + innerH * g} stroke="#22304A" strokeDasharray="3 3" />)}
        <text x={8} y={padT + 4} fill="#6E84A8" fontSize="11">{maxV}</text>
        <text x={8} y={padT + innerH + 4} fill="#6E84A8" fontSize="11">0</text>
        {data.map((d, i) => {
          const cx = padL + slot * i + slot / 2;
          const h = (d.value / maxV) * innerH;
          const c = colorFor ? colorFor(d.name, i) : "#2DD4BF";
          return (
            <g key={i} onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} style={{ cursor: "pointer" }}>
              <rect x={cx - barW / 2} y={padT + innerH - h} width={barW} height={Math.max(1, h)} fill={c} rx="5" opacity={hover === i ? 1 : 0.92} />
              {angledLabels ? <text x={cx} y={padT + innerH + 14} fill="#6E84A8" fontSize="10" textAnchor="end" transform={`rotate(-32 ${cx} ${padT + innerH + 14})`}>{d.name}</text> : <text x={cx} y={padT + innerH + 18} fill="#6E84A8" fontSize="10.5" textAnchor="middle">{d.name.length > 10 ? d.name.slice(0, 9) + "…" : d.name}</text>}
            </g>
          );
        })}
      </svg>
      {hover !== null && <ChartTooltip visible={true} x={padL + slot * hover + slot / 2} y={padT + innerH - (data[hover].value / maxV) * innerH - 8} items={[{ label: data[hover].name, value: data[hover].value, color: colorFor ? colorFor(data[hover].name, hover) : "#2DD4BF" }]} />}
    </div>
  );
}

function StackedBarChartSVG({ data, series, height = 260 }) {
  const [wrapRef, width] = useContainerWidth();
  const [hover, setHover] = useState(null);
  const padL = 38, padR = 14, padT = 16, padB = 30;
  const innerW = Math.max(10, width - padL - padR);
  const innerH = height - padT - padB;
  const totals = data.map(d => series.reduce((s, sr) => s + (d[sr.key] || 0), 0));
  const maxV = niceMax(Math.max(...totals, 1));
  const n = data.length;
  const slot = innerW / n;
  const barW = Math.min(46, slot * 0.55);
  return (
    <div ref={wrapRef} style={{ position: "relative", width: "100%" }}>

function PieChartSVG({ data, colors, height = 280 }) {
  const [hover, setHover] = useState(null);
  const total = data.reduce((s, d) => s + d.value, 0) || 1;
  const size = Math.min(height, 280);
  const cx = size / 2, cy = size / 2, rOuter = size * 0.38, rInner = size * 0.23;
  let angle = -90;
  const slices = data.map((d, i) => {
    const frac = d.value / total;
    const startAngle = angle;
    const endAngle = angle + frac * 360;
    angle = endAngle;
    return { ...d, startAngle, endAngle, color: colors[i % colors.length] };
  });
  const polarToCart = (r, a) => { const rad = (a * Math.PI) / 180; return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)]; };
  const arcPath = (s) => {
    const [x1, y1] = polarToCart(rOuter, s.startAngle);
    const [x2, y2] = polarToCart(rOuter, s.endAngle);
    const [x3, y3] = polarToCart(rInner, s.endAngle);
    const [x4, y4] = polarToCart(rInner, s.startAngle);
    const largeArc = s.endAngle - s.startAngle > 180 ? 1 : 0;
    return `M${x1},${y1} A${rOuter},${rOuter} 0 ${largeArc} 1 ${x2},${y2} L${x3},${y3} A${rInner},${rInner} 0 ${largeArc} 0 ${x4},${y4} Z`;
  };
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 24, flexWrap: "wrap", justifyContent: "center" }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {slices.map((s, i) => <path key={i} d={arcPath(s)} fill={s.color} opacity={hover === null || hover === i ? 1 : 0.45} onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} style={{ cursor: "pointer", transition: "opacity .15s" }} />)}
        <text x={cx} y={cy - 4} textAnchor="middle" fill="#EAF1FB" fontSize="20" fontWeight="600" fontFamily="Space Grotesk, sans-serif">{hover !== null ? slices[hover].value : total}</text>
        <text x={cx} y={cy + 14} textAnchor="middle" fill="#6E84A8" fontSize="10.5">{hover !== null ? slices[hover].name.slice(0, 14) : "Tổng"}</text>
      </svg>
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {slices.map((s, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12.5, color: hover === i ? "#EAF1FB" : "#AEC0DC", cursor: "pointer" }} onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)}>
            <span style={{ width: 10, height: 10, borderRadius: 3, background: s.color, display: "inline-block" }}></span>
            {s.name} <span style={{ color: "#6E84A8" }}>({s.value})</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function RadarChartSVG({ data, height = 300, color = "#2DD4BF" }) {
  const size = Math.min(height, 300);
  const cx = size / 2, cy = size / 2, r = size * 0.34;
  const maxV = niceMax(Math.max(...data.map(d => d.value), 1));
  const n = data.length || 1;
  const angleStep = (Math.PI * 2) / n;
  const pointFor = (i, value) => {
    const a = -Math.PI / 2 + angleStep * i;
    const rad = (value / maxV) * r;
    return [cx + rad * Math.cos(a), cy + rad * Math.sin(a)];
  };
  const polygonFor = (frac) => data.map((d, i) => pointFor(i, maxV * frac).join(",")).join(" ");
  const dataPolygon = data.map((d, i) => pointFor(i, d.value).join(",")).join(" ");
  return (
    <div style={{ display: "flex", justifyContent: "center" }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {[0.25, 0.5, 0.75, 1].map((f, i) => <polygon key={i} points={polygonFor(f)} fill="none" stroke="#22304A" strokeWidth="1" />)}
        {data.map((d, i) => { const [x, y] = pointFor(i, maxV); return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#22304A" strokeWidth="1" />; })}
        <polygon points={dataPolygon} fill={color} fillOpacity="0.32" stroke={color} strokeWidth="2" />
        {data.map((d, i) => { const [x, y] = pointFor(i, d.value); return <circle key={i} cx={x} cy={y} r="3" fill={color} />; })}
        {data.map((d, i) => {
          const [lx, ly] = pointFor(i, maxV * 1.18);
          return <text key={i} x={lx} y={ly} fill="#AEC0DC" fontSize="11" textAnchor="middle" dominantBaseline="middle">{d.name.length > 10 ? d.name.slice(0, 9) + "…" : d.name}</text>;
        })}
      </svg>
    </div>
  );
}

async function callGemini(systemPrompt, userPrompt) {
  // Trỏ trực tiếp đến cổng dịch vụ tổng hợp v1beta với key AQ. để tránh lỗi phân giải domain doanh nghiệp
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${GEMINI_API_KEY}`;
  
  try {
    const resp = await fetch(url, {
      method: "POST",
      headers: { 
        "Content-Type": "application/json",
        // Bổ sung các tham số cho phép trình duyệt bắt tay trực tiếp với máy chủ Google AI
        "Accept": "application/json"
      },
      body: JSON.stringify({
        contents: [
          {
            parts: [
              { text: systemPrompt + "\n\n---\n\n" + userPrompt }
            ]
          }
        ]
      })
    });

    if (!resp.ok) {
      const errBody = await resp.json();
      throw new Error(errBody.error?.message || "Lỗi phản hồi từ Google AI");
    }

    const data = await resp.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) throw new Error("Gemini trả về chuỗi phản hồi trống");
    return text;
  } catch (err) {
    throw new Error("Lỗi kết nối AI trực tiếp: " + err.message);
  }
}

function parseJSONLoose(text) {
  let clean = text.trim().replace(/^```json/i, "").replace(/^```/, "").replace(/```$/, "").trim();
  try { return JSON.parse(clean); } catch (e) {
    const match = clean.match(/\{[\s\S]*\}|\[[\s\S]*\]/);
    if (match) { try { return JSON.parse(match[0]); } catch (e2) { return null; } }
    return null;
  }
}

- company: Tên công ty/khách hàng.
- industry: Chọn 1 trong ["Bán lẻ", "Tài chính/Ngân hàng", "Bất động sản", "Sản xuất", "Logistics", "Giáo dục", "Y tế", "F&B", "Du lịch", "Khác"].

      notify("Đã xoá khỏi Cloud Real-time", "success");
    } catch (err) {
      notify("Lỗi xoá: " + err.message, "error");
    }
  };

  const parseRows = (rows) => {
    const norm = (s) => (s || "").toString().toLowerCase().trim();
    const findKey = (obj, keys) => Object.keys(obj).find(k => keys.some(kk => norm(k).includes(kk)));
    const out = [];
    for (const row of rows) {
      const companyKey = findKey(row, ["công ty", "cong ty", "khách hàng", "khach hang", "company", "tên"]);
      const industryKey = findKey(row, ["ngành", "nganh", "industry"]);
      const productKey = findKey(row, ["sản phẩm", "san pham", "product"]);
      const stageKey = findKey(row, ["giai đoạn", "giai doan", "stage", "trạng thái", "trang thai"]);
      const valueKey = findKey(row, ["giá trị", "gia tri", "value", "deal"]);
      const noteKey = findKey(row, ["ghi chú", "ghi chu", "note", "mô tả", "mo ta", "nhu cầu", "nhu cau"]);
      const dateKey = findKey(row, ["ngày", "ngay", "date"]);
      if (!companyKey && !noteKey) continue;
      let rawVal = valueKey ? row[valueKey] : null; let numVal = null;
      if (rawVal != null) { numVal = Number(String(rawVal).replace(/[^\d.-]/g, "")); if (isNaN(numVal)) numVal = null; }
      let rawDate = dateKey ? row[dateKey] : null; let isoDate = new Date().toISOString();
      if (rawDate) { const d = new Date(rawDate); if (!isNaN(d.getTime())) isoDate = d.toISOString(); }
      out.push({
        company: companyKey ? String(row[companyKey] || "Không rõ tên") : "Không rõ tên",
        industry: industryKey ? String(row[industryKey] || "Khác") : "Khác",
        product: productKey ? String(row[productKey] || PRODUCTS[0]) : PRODUCTS[0],
        stage: stageKey ? String(row[stageKey] || STAGES[0]) : STAGES[0],
        value: numVal, note: noteKey ? String(row[noteKey] || "") : "",
        date: isoDate, source: "import"
      });
    }
    return out;
  };

  const handleFile = (file) => {
    if (!file) return;
    setImporting(true);
    const ext = file.name.split(".").pop().toLowerCase();
    
    const uploadBatch = async (rows) => {
      try {
        for (const r of rows) {
          const newRef = dbRT.push();
          await newRef.set(r);
        }
        notify(`Đã đồng bộ ${rows.length} khách hàng lên Cloud Real-time`, "success");
      } catch (err) {
        notify("Lỗi đồng bộ Firebase", "error");
      }
      setImporting(false);
    };

    if (ext === "csv") {
      Papa.parse(file, { header: true, skipEmptyLines: true, complete: (res) => { const rows = parseRows(res.data); uploadBatch(rows); }, error: () => { notify("Lỗi đọc CSV", "error"); setImporting(false); } });
    } else if (ext === "xlsx" || ext === "xls") {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const wb = XLSX.read(e.target.result, { type: "array" });
          const rows = parseRows(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" }));
          uploadBatch(rows);
        } catch (err) { notify("Lỗi đọc Excel", "error"); setImporting(false); }
      };
      reader.readAsArrayBuffer(file);
    } else { notify("Chỉ hỗ trợ .csv, .xlsx", "error"); setImporting(false); }
  };

  return (
    <div>
      <div className="grid-2">
        <div className="card">
          <div className="card-head"><div><div className="card-title">{editingId ? "Cập nhật khách hàng" : "Thêm khách hàng / nhu cầu mới"}</div><div className="card-sub">Nhập tay hoặc nói trực tiếp ghi chú nhu cầu bằng tiếng Việt</div></div>{editingId && <button className="btn btn-ghost" onClick={resetForm}>Hủy</button>}</div>
          <form onSubmit={handleSubmit}>
            <div className="field-row">
              <div className="field"><label>Tên khách hàng *</label><input className={highlightFields.company ? "field-ai-filled" : ""} value={form.company} onChange={e => setForm(f => ({ ...f, company: e.target.value }))} placeholder="VD: Mekong Retail" /></div>
              <div className="field"><label>Ngành</label><select className={highlightFields.industry ? "field-ai-filled" : ""} value={form.industry} onChange={e => setForm(f => ({ ...f, industry: e.target.value }))}>{INDUSTRIES.map(i => <option key={i} value={i}>{i}</option>)}</select></div>
            </div>
            <div className="field-row">
              <div className="field"><label>Sản phẩm</label><select className={highlightFields.product ? "field-ai-filled" : ""} value={form.product} onChange={e => setForm(f => ({ ...f, product: e.target.value }))}>{PRODUCTS.map(p => <option key={p} value={p}>{p}</option>)}</select></div>
              <div className="field"><label>Giai đoạn</label><select className={highlightFields.stage ? "field-ai-filled" : ""} value={form.stage} onChange={e => setForm(f => ({ ...f, stage: e.target.value }))}>{STAGES.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
            </div>
            <div className="field-row">
              <div className="field"><label>Giá trị (VND)</label><input className={highlightFields.value ? "field-ai-filled" : ""} type="number" value={form.value} onChange={e => setForm(f => ({ ...f, value: e.target.value }))} placeholder="VD: 150000000" /></div>
              <div className="field"><label>Ngày ghi nhận</label><input type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} /></div>
            </div>
            <div className="field">
              <label style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span>Ghi chú nhu cầu *</span>
                <button type="button" className={"btn btn-rec" + (recording ? " recording" : "")} style={{ padding: "4px 10px", fontSize: 11.5, opacity: aiProcessing ? 0.6 : 1 }} onClick={recording ? stopRecording : startRecording} disabled={aiProcessing}>
                  {recording ? <span className="waveform"><span style={{ animationDelay: "0s" }}></span><span style={{ animationDelay: ".15s" }}></span><span style={{ animationDelay: ".3s" }}></span><span style={{ animationDelay: ".1s" }}></span></span> : aiProcessing ? <span className="loader-dot"></span> : "●"} {recording ? "Đang ghi…" : aiProcessing ? "AI đang xử lý…" : "Ghi âm tiếng Việt"}
                </button>
              </label>
              <textarea value={form.note} onChange={e => setForm(f => ({ ...f, note: e.target.value }))} disabled={aiProcessing} style={aiProcessing ? { opacity: 0.6 } : {}} />
              {aiProcessing && <div style={{ color: "var(--teal)", fontSize: 12, marginTop: 6 }}>✦ AI đang làm sạch ghi chú và trích xuất thông tin…</div>}
              {recError && <div style={{ color: "var(--rose)", fontSize: 12, marginTop: 6 }}>{recError}</div>}
            </div>
            <button type="submit" className="btn btn-primary" style={{ width: "100%", justifyContent: "center" }} disabled={recording || aiProcessing}>{recording ? "Đang ghi âm..." : aiProcessing ? "Đang chờ AI..." : editingId ? "Lưu thay đổi" : "Lưu lên Đám mây"}</button>
          </form>
        </div>
        <div>
          <div className="card">
            <div className="card-head"><div><div className="card-title">Nhập từ file Excel / CSV</div></div></div>
            <div className={"upload-zone" + (dragActive ? " drag" : "")} onDragOver={e => { e.preventDefault(); setDragActive(true); }} onDragLeave={() => setDragActive(false)} onDrop={e => { e.preventDefault(); setDragActive(false); handleFile(e.dataTransfer.files[0]); }} onClick={() => fileInputRef.current.click()} style={{ cursor: "pointer" }}>
              <input ref={fileInputRef} type="file" accept=".csv,.xlsx,.xls" style={{ display: "none" }} onChange={e => handleFile(e.target.files[0])} />
              <div style={{ fontSize: 26, marginBottom: 8, color: "var(--text-low)" }}>⇧</div>
              <div style={{ fontSize: 13.5, color: "var(--text-mid)", marginBottom: 4 }}>{importing ? "Đang xử lý & lưu lên Cloud…" : "Kéo thả file vào đây, hoặc bấm chọn"}</div>
            </div>
          </div>
        </div>
      </div>
      <div className="card">
        <div className="card-head"><div className="card-title">Danh sách khách hàng ({customers.length})</div></div>
        {customers.length === 0 ? <div className="empty-state"><div className="em-icon">◎</div><h3>Chưa có dữ liệu</h3></div> : (
          <div style={{ overflowX: "auto" }}>
            <table>
              <thead><tr><th>Công ty</th><th>Ngành</th><th>Sản phẩm</th><th>Giai đoạn</th><th>Giá trị</th><th>Ghi chú</th><th>Ngày</th><th></th></tr></thead>
              <tbody>
                {customers.slice(0, 50).map(c => (
                  <tr key={c.id} className="row-hover">
                    <td className="strong">{c.company}</td><td>{c.industry}</td><td>{c.product}</td>
                    <td><span className="pill" style={{ background: STAGE_COLORS[c.stage] + "22", color: STAGE_COLORS[c.stage] }}>{c.stage}</span></td>
                    <td>{fmtVND(c.value)}</td><td style={{ maxWidth: 280 }}>{c.note.slice(0, 90)}</td>
                    <td style={{ whiteSpace: "nowrap" }}>{fmtDate(c.date)}</td>
                    <td style={{ whiteSpace: "nowrap" }}>
                      <button className="btn btn-ghost" style={{ padding: "5px 9px", fontSize: 11.5, marginRight: 6 }} onClick={() => handleEdit(c)}>Sửa</button>
                      <button className="btn btn-danger" style={{ padding: "5px 9px", fontSize: 11.5 }} onClick={() => handleDelete(c.id)}>Xoá</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

function DashboardPage({ customers, range, setRange }) {
  const filtered = useMemo(() => filterByRange(customers, range), [customers, range]);
  const kpis = useMemo(() => {
    const total = filtered.length; const won = filtered.filter(c => c.stage === "Ký hợp đồng"); const lost = filtered.filter(c => c.stage === "Mất khách");
    const wonValue = won.reduce((s, c) => s + (c.value || 0), 0); const pipelineValue = filtered.filter(c => c.stage !== "Mất khách").reduce((s, c) => s + (c.value || 0), 0);
    return { total, wonCount: won.length, lostCount: lost.length, wonValue, pipelineValue, winRate: total ? Math.round((won.length / total) * 100) : 0 };
  }, [filtered]);
  const stageData = useMemo(() => STAGES.map(s => ({ name: s, value: filtered.filter(c => c.stage === s).length })), [filtered]);
  const productData = useMemo(() => PRODUCTS.map(p => ({ name: p, value: filtered.filter(c => c.product === p).length })), [filtered]);
  const monthlyTrend = useMemo(() => buildMonthlyTrend(filtered), [filtered]);
  const industryData = useMemo(() => {
    const map = {}; filtered.forEach(c => { map[c.industry] = (map[c.industry] || 0) + 1; });
    return Object.entries(map).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value).slice(0, 8);
  }, [filtered]);

  return (
    <div>
      <RangeBar range={range} setRange={setRange} />
      <div className="kpi-grid">
        <KpiCard label="Tổng khách hàng" value={kpis.total} />
        <KpiCard label="Tỷ lệ chốt" value={kpis.winRate + "%"} sub={`${kpis.wonCount} ký / ${kpis.lostCount} mất`} accent={kpis.winRate >= 30 ? "up" : "down"} />
        <KpiCard label="Giá trị đã ký" value={fmtVND(kpis.wonValue) + " ₫"} />
        <KpiCard label="Giá trị pipeline" value={fmtVND(kpis.pipelineValue) + " ₫"} />
      </div>
      <div className="grid-2">
        <div className="card"><div className="card-head"><div><div className="card-title">Xu hướng tiếp cận</div></div></div>{monthlyTrend.length === 0 ? <EmptyChart /> : <AreaChartSVG data={monthlyTrend.map(d => ({ x: d.month, y: d.count }))} />}</div>
        <div className="card"><div className="card-head"><div className="card-title">Sản phẩm</div></div>{filtered.length === 0 ? <EmptyChart /> : <PieChartSVG data={productData} colors={["#2DD4BF", "#818CF8", "#F5A524"]} />}</div>
      </div>
      <div className="grid-2">
        <div className="card"><div className="card-head"><div className="card-title">Giai đoạn sale</div></div>{filtered.length === 0 ? <EmptyChart /> : <BarChartSVG data={stageData} layout="horizontal" colorFor={(name) => STAGE_COLORS[name]} />}</div>
        <div className="card"><div className="card-head"><div className="card-title">Ngành</div></div>{industryData.length === 0 ? <EmptyChart /> : <BarChartSVG data={industryData} colorFor={() => "#818CF8"} angledLabels />}</div>
      </div>
    </div>
  );
}

function TrendsPage({ customers, range, setRange }) {
  const filtered = useMemo(() => filterByRange(customers, range), [customers, range]);
  const stageOverTime = useMemo(() => {
    const map = {}; filtered.forEach(c => { const k = monthKey(c.date); if (!map[k]) map[k] = { month: k }; map[k][c.stage] = (map[k][c.stage] || 0) + 1; });
    return Object.entries(map).sort((a, b) => a[0].localeCompare(b[0])).map(([k, v]) => ({ ...v, month: `${k.split("-")[1]}/${k.split("-")[0].slice(2)}` }));
  }, [filtered]);
  const productOverTime = useMemo(() => {
    const map = {}; filtered.forEach(c => { const k = monthKey(c.date); if (!map[k]) map[k] = { month: k }; map[k][c.product] = (map[k][c.product] || 0) + 1; });
    return Object.entries(map).sort((a, b) => a[0].localeCompare(b[0])).map(([k, v]) => ({ ...v, month: `${k.split("-")[1]}/${k.split("-")[0].slice(2)}` }));
  }, [filtered]);
  const valueByMonth = useMemo(() => {
    const map = {}; filtered.forEach(c => { const k = monthKey(c.date); map[k] = (map[k] || 0) + (c.value || 0); });
    return Object.entries(map).sort((a, b) => a[0].localeCompare(b[0])).map(([k, v]) => ({ month: `${k.split("-")[1]}/${k.split("-")[0].slice(2)}`, value: Math.round(v / 1e6) }));
  }, [filtered]);

  return (
    <div>
      <RangeBar range={range} setRange={setRange} />
      <div className="card"><div className="card-head"><div><div className="card-title">Xu hướng giai đoạn</div></div></div>{stageOverTime.length === 0 ? <EmptyChart /> : <MultiLineChartSVG data={stageOverTime} series={STAGES.map(s => ({ key: s, color: STAGE_COLORS[s] }))} />}</div>
      <div className="grid-2">
        <div className="card"><div className="card-head"><div className="card-title">CRM vs Cisco</div></div>{productOverTime.length === 0 ? <EmptyChart /> : <StackedBarChartSVG data={productOverTime} series={PRODUCTS.map((p, i) => ({ key: p, color: ["#2DD4BF", "#818CF8", "#F5A524"][i] }))} />}</div>
        <div className="card"><div className="card-head"><div className="card-title">Giá trị (triệu ₫)</div></div>{valueByMonth.length === 0 ? <EmptyChart /> : <AreaChartSVG data={valueByMonth.map(d => ({ x: d.month, y: d.value }))} color="#F5A524" />}</div>
      </div>
    </div>
  );
}

            <tbody>
              {filtered.map(c => (

function AIPage({ customers, notify }) {
  const [loading, setLoading] = useState(false); const [result, setResult] = useState(null); const [error, setError] = useState("");
  const runAnalysis = async () => {
    if (customers.length === 0) { notify("Chưa có dữ liệu", "error"); return; }
    setLoading(true); setError("");
    try {
      const sample = customers.slice(0, 80).map(c => ({ company: c.company, industry: c.industry, product: c.product, stage: c.stage, value: c.value, note: c.note }));
      const system = `Phân tích dữ liệu khách hàng CRM/Cisco B2B. Trả về chuẩn JSON duy nhất: {"summary": "tóm tắt", "pain_points": [{"theme": "", "detail": ""}], "product_ideas": [{"idea": "", "rationale": ""}]}`;
      const text = await callGemini(system, JSON.stringify(sample));
      const parsed = parseJSONLoose(text);
      if (!parsed) throw new Error("Lỗi đọc chuẩn JSON");
      setResult(parsed); notify("Hoàn tất", "success");
    } catch (e) { setError(e.message); notify("Lỗi phân tích", "error"); } finally { setLoading(false); }
  };
  return (
    <div>
      <div className="card">
        <div className="card-head">
          <div><div className="card-title">Phân tích sâu bằng AI</div></div>
          <button className="btn btn-primary" onClick={runAnalysis} disabled={loading}>{loading ? "Đang phân tích…" : "✦ Phân tích ngay"}</button>
        </div>
        {error && <div style={{ color: "var(--rose)" }}>{error}</div>}
        {result && !loading && (
          <>
            <p style={{ color: "var(--text-mid)", fontSize: 14 }}>{result.summary}</p>
            <div className="grid-2">
              <SectionList title="Pain points nổi bật" items={result.pain_points} render={(it, i) => <div className="insight-item" key={i}><div><p><strong>{it.theme}</strong></p><p>{it.detail}</p></div></div>} />
              <SectionList title="Ý tưởng sản phẩm" items={result.product_ideas} render={(it, i) => <div className="insight-item" key={i}><div><p><strong>{it.idea}</strong></p><p>{it.rationale}</p></div></div>} />
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function SectionList({ title, items, render }) { return <div className="card"><div className="card-title" style={{ marginBottom: 6 }}>{title}</div>{(!items || items.length === 0) ? <p>Không có dữ liệu</p> : items.map(render)}</div>; }
function EmptyChart() { return <div className="empty-state" style={{ padding: "40px 20px" }}><p>Chưa có dữ liệu</p></div>; }
function KpiCard({ label, value, sub, accent }) { return <div className="kpi-card"><div className="kpi-label">{label}</div><div className="kpi-value">{value}</div></div>; }
function RangeBar({ range, setRange }) { return <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 16 }}><div className="seg-toggle">{[{ k: "3m", l: "3 tháng" }, { k: "all", l: "Tất cả" }].map(o => <button key={o.k} className={"seg-btn" + (range === o.k ? " active" : "")} onClick={() => setRange(o.k)}>{o.l}</button>)}</div></div>; }
function filterByRange(customers, range) { if (range === "all") return customers; const cutoff = new Date(); cutoff.setMonth(cutoff.getMonth() - 3); return customers.filter(c => new Date(c.date) >= cutoff); }
function buildMonthlyTrend(customers) { const map = {}; customers.forEach(c => { const k = monthKey(c.date); map[k] = (map[k] || 0) + 1; }); return Object.entries(map).sort().map(([k, v]) => ({ month: `${k.split("-")[1]}/${k.split("-")[0].slice(2)}`, count: v })); }

function App() {

  const [customers, setCustomers] = useState([]); 
  const [loaded, setLoaded] = useState(false); 
  const [range, setRange] = useState("all"); 
  const [toast, setToast] = useState(null);
  const notify = useCallback((message, type = "info") => setToast({ message, type, key: Date.now() }), []);

    dbRT.orderByChild("date").on("value", (snapshot) => {
      const list = [];
      snapshot.forEach((childSnap) => {

      });
      setCustomers(list);
      setLoaded(true);

  return (

      <Sidebar active={active} setActive={setActive} count={customers.length} />
      <div className="main">
        <div className="topbar">
          <div><h1>{title}</h1><p>{sub}</p></div>
          <div className="pill pill-teal">● Đồng bộ Cloud Real-time siêu tốc</div>
        </div>
        <div className="content">
          <>
            {active === "input" && <InputPage customers={customers} notify={notify} />}
            {active === "dashboard" && <DashboardPage customers={customers} range={range} setRange={setRange} />}
            {active === "trends" && <TrendsPage customers={customers} range={range} setRange={setRange} />}
            {active === "deepdive" && <DeepDivePage customers={customers} />}
            {active === "ai" && <AIPage customers={customers} notify={notify} />}
          </>
        </div>
      </div>
      {toast && <Toast key={toast.key} message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
